<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Juniper — Trova il posto giusto</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f9fafb}
#root{max-width:480px;margin:0 auto;min-height:100vh}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const GREEN="linear-gradient(135deg,#1a5c3a,#0f3d26)";
const TAGS={
  gluten_free: {it:"Gluten Free",        en:"Gluten Free",          icon:"🌾",color:"#f59e0b"},
  lactose_free:{it:"Lactose Free",        en:"Lactose Free",         icon:"🥛",color:"#3b82f6"},
  combo_free:  {it:"Glutine & Lattosio Free",en:"Gluten & Lactose Free",icon:"✨",color:"#e05c1a"},
  vegan:       {it:"Vegano",              en:"Vegan",                icon:"🌱",color:"#10b981"},
  vegetarian:  {it:"Vegetariano",         en:"Vegetarian",           icon:"🥗",color:"#84cc16"},
  pet_friendly:{it:"Pet Friendly",        en:"Pet Friendly",         icon:"🐾",color:"#8b5cf6"},
  no_cross:    {it:"Cucina Dedicata",     en:"Dedicated Kitchen",    icon:"✅",color:"#065f46"},
  low_cross:   {it:"Attenzione Massima",  en:"Extra Care",           icon:"⚠️",color:"#d97706"},
  high_cross:  {it:"Cucina Condivisa",    en:"Shared Kitchen",       icon:"❌",color:"#dc2626"},
};
const MEALS={
  breakfast:{it:"Colazione",en:"Breakfast",icon:"🥐"},
  lunch:    {it:"Pranzo",   en:"Lunch",    icon:"☀️"},
  aperitivo:{it:"Aperitivo",en:"Aperitivo",icon:"🍹"},
  dinner:   {it:"Cena",     en:"Dinner",   icon:"🌙"},
};
const SOURCES={
  registered:{it:"Registrata",en:"Registered",icon:"🏢",color:"#1a5c3a",bg:"#e8f5ee"},
  verified:  {it:"Verificata",en:"Verified",  icon:"🌿",color:"#2563eb",bg:"#dbeafe"},
  google:    {it:"Da Google", en:"From Google",icon:"📍",color:"#6b7280",bg:"#f3f4f6"},
};
const STRUCTS=[
  {id:1,name:"Osteria da Marco",city:"Firenze",country:"Italia",type:"ristorante",tags:["gluten_free","lactose_free","combo_free","vegetarian","vegan","no_cross"],meals:["lunch","dinner"],certified:true,rating:4.7,reviewCount:128,emoji:"🍝",description:"Cucina toscana tradizionale con ampie opzioni per ogni esigenza alimentare.",address:"Via dei Servi, 12",phone:"+39 055 123456",sponsored:true,source:"registered"},
  {id:2,name:"Bar Latte e Miele",city:"Milano",country:"Italia",type:"bar",tags:["lactose_free","vegan","low_cross"],meals:["breakfast","aperitivo"],certified:true,rating:4.5,reviewCount:89,emoji:"☕",description:"Bar moderno con latti vegetali e alternative senza lattosio.",address:"Corso Buenos Aires, 34",phone:"+39 02 987654",sponsored:false,source:"registered"},
  {id:3,name:"Il Giardino Verde",city:"Roma",country:"Italia",type:"ristorante",tags:["vegan","vegetarian","gluten_free","high_cross"],meals:["lunch","dinner"],certified:false,rating:4.3,reviewCount:67,emoji:"🥗",description:"Ristorante vegano nel cuore di Roma, ingredienti biologici a km zero.",address:"Via del Pigneto, 56",phone:"+39 06 112233",sponsored:false,source:"verified"},
  {id:4,name:"Agriturismo Monte Amiata",city:"Santa Fiora",country:"Italia",type:"ristorante",tags:["vegan","vegetarian","gluten_free","combo_free","no_cross","pet_friendly"],meals:["lunch","dinner"],certified:true,rating:4.8,reviewCount:134,emoji:"🌾",description:"Cucina biologica e vegana sull'Amiata. Cucina dedicata, zero contaminazione.",address:"Loc. Poggio, Santa Fiora GR",phone:"+39 0564 977890",sponsored:false,source:"verified"},
  {id:5,name:"The Green Table",city:"Londra",country:"UK",type:"ristorante",tags:["vegan","lactose_free","gluten_free","combo_free","no_cross"],meals:["lunch","dinner"],certified:true,rating:4.8,reviewCount:312,emoji:"🌿",description:"Award-winning vegan restaurant in central London.",address:"Carnaby Street, 15",phone:"+44 20 12345678",sponsored:false,source:"verified"},
  {id:6,name:"Trattoria Bellavista",city:"Napoli",country:"Italia",type:"ristorante",tags:["gluten_free","vegetarian","high_cross"],meals:["lunch","dinner"],certified:false,rating:4.6,reviewCount:178,emoji:"🍕",description:"Autentica pizza napoletana con opzioni gluten free.",address:"Via Tribunali, 45",phone:"+39 081 234567",sponsored:false,source:"google"},
  {id:7,name:"Latteria Moderna",city:"Torino",country:"Italia",type:"bar",tags:["lactose_free","gluten_free","combo_free","no_cross"],meals:["breakfast","lunch"],certified:false,rating:4.5,reviewCount:112,emoji:"🧋",description:"Colazioni e pranzi senza lattosio e glutine.",address:"Via Po, 22",phone:"+39 011 345678",sponsored:false,source:"verified"},
  {id:8,name:"Sushi & Free",city:"Milano",country:"Italia",type:"ristorante",tags:["gluten_free","lactose_free","combo_free","no_cross"],meals:["lunch","dinner","aperitivo"],certified:false,rating:4.4,reviewCount:167,emoji:"🍱",description:"Sushi bar con menu completamente gluten free e lactose free.",address:"Navigli, Via Alzaia, 90",phone:"+39 02 567890",sponsored:false,source:"google"},
];
const DIET_TAGS=["gluten_free","lactose_free","combo_free","vegan","vegetarian","pet_friendly"];
const CROSS_TAGS=["no_cross","low_cross","high_cross"];
const CROSS_DESC={
  it:{no_cross:"Cucina separata dedicata, zero rischio contaminazione",low_cross:"Massima attenzione ma non garantiamo al 100%",high_cross:"Cucina condivisa, possibile contaminazione crociata"},
  en:{no_cross:"Dedicated separate kitchen, zero cross-contamination",low_cross:"We take care but cannot guarantee 100%",high_cross:"Shared kitchen, cross-contamination possible"},
};
const sorted=[...STRUCTS].sort((a,b)=>{
  const r={registered:3,verified:2,google:1};
  return(r[b.source]||0)-(r[a.source]||0)||Number(b.sponsored)-Number(a.sponsored);
});
const inp={width:"100%",padding:"10px 14px",borderRadius:10,border:"1.5px solid #e5e7eb",fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box"};
const card={background:"white",borderRadius:14,padding:16,boxShadow:"0 2px 12px rgba(0,0,0,.07)",marginBottom:10};

// ── LOGO ──
function Logo({size=18,white=true}){
  return(
    <svg width={size} height={size*1.7} viewBox="0 0 40 68" style={{display:"block",flexShrink:0}}>
      <circle cx="20" cy="12" r="12" fill={white?"white":"#1a5c3a"}/>
      <circle cx="14" cy="7" r="3" fill={white?"#1a5c3a":"white"} opacity="0.35"/>
      <path d="M20,24 L20,52 Q20,66 6,66" fill="none" stroke={white?"white":"#1a5c3a"} strokeWidth="7" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

// ── BUSINESS SCREEN (componente separato per hooks puliti) ──
function BusinessScreen({lang,go,GREEN,sorted}){
  const t2={
    it:{back:"Indietro",title:"Registra la tua attività",sub:"Raggiungi chi cerca esattamente quello che offri",
      searchLabel:"Sei già presente su Juniper?",searchSub:"Cerca il tuo locale — se lo trovi clicca 'Sono il titolare'",
      searchPh:"Cerca per nome o città...",claim:"Sono il titolare",notFound:"Il mio locale non è in lista",
      addNew:"Aggiungi la mia attività da zero",results:"risultati",
      baseInfo:"📋 Informazioni base",typeLabel:"🏪 Tipo di attività",
      openLabel:"🍽️ Quando siete aperti?",offersLabel:"✅ Cosa offrite? (seleziona tutto)",
      kitchenLabel:"🔬 Sicurezza in cucina",kitchenSub:"Scegli una sola opzione — sii onesto, è importante per i tuoi clienti",
      badgeLabel:"🏅 Richiedi Badge Certificato",badgeSub:"Il nostro team verifica le tue info. Servizio a pagamento.",
      send:"Invia richiesta",reply:"Ti risponderemo entro 48 ore",
      sent:"Richiesta inviata!",sentSub:"Ti contatteremo entro 48 ore all'indirizzo",backHome:"Torna alla home",
      claiming:"Stai rivendicando:",claimSub:"I dati sono stati precompilati. Verifica e completa.",
      cancel:"Annulla",},
    en:{back:"Back",title:"Register your business",sub:"Reach those looking for exactly what you offer",
      searchLabel:"Are you already on Juniper?",searchSub:"Search your venue — if found click 'I'm the owner'",
      searchPh:"Search by name or city...",claim:"I'm the owner",notFound:"My venue isn't listed",
      addNew:"Add my business from scratch",results:"results",
      baseInfo:"📋 Basic info",typeLabel:"🏪 Type",
      openLabel:"🍽️ When are you open?",offersLabel:"✅ What do you offer? (select all)",
      kitchenLabel:"🔬 Kitchen safety",kitchenSub:"Choose one — be honest, it matters to your customers",
      badgeLabel:"🏅 Request Certified Badge",badgeSub:"Our team verifies your info. Paid service.",
      send:"Send request",reply:"We'll reply within 48 hours",
      sent:"Request sent!",sentSub:"We'll contact you within 48h at",backHome:"Back to home",
      claiming:"Claiming:",claimSub:"Data pre-filled. Verify and complete.",
      cancel:"Cancel",},
  };
  const tx=t2[lang];
  const ghost2={background:"rgba(255,255,255,0.2)",border:"none",color:"white",padding:"6px 12px",borderRadius:20,cursor:"pointer",fontSize:13};
  const btnG2={background:GREEN,color:"white",border:"none",padding:"13px",borderRadius:12,fontWeight:700,fontSize:15,cursor:"pointer",width:"100%"};

  const [step,setStep]=React.useState("search");
  const [q,setQ]=React.useState("");
  const [found,setFound]=React.useState([]);
  const [sel,setSel]=React.useState(null);
  const [sent,setSent]=React.useState(false);
  const [form,setForm]=React.useState({name:"",type:"ristorante",city:"",address:"",phone:"",email:"",website:"",instagram:"",description:"",tags:[],meals:[],cross:"",certified:false});

  const doSearch=()=>{
    const lq=q.toLowerCase();
    setFound(sorted.filter(s=>s.name.toLowerCase().includes(lq)||s.city.toLowerCase().includes(lq)));
  };

  const claim=(s)=>{
    if(s){
      setSel(s);
      setForm(f=>({...f,
        name:s.name,city:s.city,address:s.address||"",phone:s.phone||"",
        tags:s.tags.filter(k=>DIET_TAGS.includes(k)),
        meals:s.meals||[],
        cross:s.tags.find(k=>CROSS_TAGS.includes(k))||"",
      }));
    } else {
      setSel(null);
      setForm({name:"",type:"ristorante",city:"",address:"",phone:"",email:"",website:"",instagram:"",description:"",tags:[],meals:[],cross:"",certified:false});
    }
    setStep("form");
  };

  const toggleTag=k=>setForm(f=>({...f,tags:f.tags.includes(k)?f.tags.filter(x=>x!==k):[...f.tags,k]}));
  const toggleMeal=k=>setForm(f=>({...f,meals:f.meals.includes(k)?f.meals.filter(x=>x!==k):[...f.meals,k]}));
  const setCross=k=>setForm(f=>({...f,cross:f.cross===k?"":k}));

  if(sent){
    return(
      <div style={{minHeight:"100vh",background:"#f9fafb"}}>
        <div style={{background:GREEN,padding:"20px",color:"white"}}>
          <button onClick={()=>go("welcome")} style={ghost2}>← {tx.back}</button>
        </div>
        <div style={{padding:16}}>
          <div style={{...card,textAlign:"center",padding:28}}>
            <div style={{fontSize:52,marginBottom:12}}>✅</div>
            <h3 style={{margin:"0 0 8px",fontSize:18,fontWeight:800,color:"#1a5c3a"}}>{tx.sent}</h3>
            <p style={{margin:"0 0 20px",fontSize:14,color:"#6b7280"}}>{tx.sentSub} <strong>{form.email}</strong></p>
            <button onClick={()=>go("welcome")} style={btnG2}>{tx.backHome}</button>
          </div>
        </div>
      </div>
    );
  }

  if(step==="search"){
    return(
      <div style={{minHeight:"100vh",background:"#f9fafb",paddingBottom:40}}>
        <div style={{background:GREEN,padding:"20px",color:"white"}}>
          <button onClick={()=>go("welcome")} style={{...ghost2,marginBottom:10,display:"block"}}>← {tx.back}</button>
          <Logo size={24}/>
          <h2 style={{margin:"8px 0 2px",fontSize:17,fontWeight:700}}>🏢 {tx.title}</h2>
          <p style={{margin:0,fontSize:13,opacity:.8}}>{tx.sub}</p>
        </div>
        <div style={{padding:16}}>
          <div style={card}>
            <p style={{margin:"0 0 4px",fontSize:14,fontWeight:700,color:"#1f2937"}}>{tx.searchLabel}</p>
            <p style={{margin:"0 0 12px",fontSize:13,color:"#6b7280"}}>{tx.searchSub}</p>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch()}
                placeholder={tx.searchPh} style={{...inp,flex:1}}/>
              <button onClick={doSearch} style={{background:"#1a5c3a",color:"white",border:"none",padding:"10px 16px",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:14}}>🔍</button>
            </div>
            {found.length>0&&(
              <div>
                <p style={{margin:"0 0 8px",fontSize:12,color:"#6b7280",fontWeight:600}}>{found.length} {tx.results}</p>
                {found.map(s=>(
                  <div key={s.id} style={{border:"1.5px solid #e5e7eb",borderRadius:12,padding:12,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
                    <div>
                      <p style={{margin:"0 0 2px",fontWeight:700,fontSize:13}}>{s.emoji} {s.name}</p>
                      <p style={{margin:0,fontSize:11,color:"#6b7280"}}>📍 {s.city}</p>
                    </div>
                    <button onClick={()=>claim(s)} style={{background:"#1a5c3a",color:"white",border:"none",padding:"8px 12px",borderRadius:10,cursor:"pointer",fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>
                      {tx.claim}
                    </button>
                  </div>
                ))}
                <div style={{borderTop:"1px solid #f3f4f6",paddingTop:12,marginTop:8}}>
                  <button onClick={()=>claim(null)} style={{width:"100%",background:"#f0fdf4",color:"#1a5c3a",border:"1.5px solid #bbf7d0",padding:12,borderRadius:12,cursor:"pointer",fontSize:13,fontWeight:700}}>
                    + {tx.notFound}
                  </button>
                </div>
              </div>
            )}
            <button onClick={()=>claim(null)} style={{width:"100%",background:"#f9fafb",border:"1.5px solid #e5e7eb",padding:12,borderRadius:12,cursor:"pointer",fontSize:13,fontWeight:600,color:"#374151",marginTop:found.length>0?0:4}}>
              + {tx.addNew}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // FORM
  const fields=[
    {k:"name",p:lang==="it"?"Nome attività *":"Business name *"},
    {k:"city",p:lang==="it"?"Città *":"City *"},
    {k:"address",p:lang==="it"?"Indirizzo":"Address"},
    {k:"phone",p:lang==="it"?"Telefono":"Phone"},
    {k:"email",p:"Email *"},
    {k:"website",p:lang==="it"?"Sito web (opzionale)":"Website (optional)"},
    {k:"instagram",p:"Instagram (opzionale)"},
  ];
  const types=["ristorante","bar","pizzeria","pasticceria","agriturismo","hotel","altro"];
  const typeEmojis={ristorante:"🍽️",bar:"☕",pizzeria:"🍕",pasticceria:"🧁",agriturismo:"🌾",hotel:"🏨",altro:"🏪"};

  return(
    <div style={{minHeight:"100vh",background:"#f9fafb",paddingBottom:40}}>
      <div style={{background:GREEN,padding:"20px",color:"white"}}>
        <button onClick={()=>setStep("search")} style={{...ghost2,marginBottom:10,display:"block"}}>← {tx.back}</button>
        <Logo size={24}/>
        <h2 style={{margin:"8px 0 2px",fontSize:17,fontWeight:700}}>🏢 {tx.title}</h2>
      </div>
      <div style={{padding:16}}>
        {sel&&(
          <div style={{background:"#f0fdf4",borderRadius:12,padding:12,marginBottom:12,border:"1.5px solid #bbf7d0"}}>
            <p style={{margin:"0 0 2px",fontWeight:700,fontSize:13,color:"#1a5c3a"}}>{tx.claiming} {sel.emoji} {sel.name}</p>
            <p style={{margin:0,fontSize:11,color:"#6b7280"}}>{tx.claimSub}</p>
          </div>
        )}
        <div style={card}>
          <p style={{margin:"0 0 10px",fontSize:11,color:"#6b7280",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>{tx.baseInfo}</p>
          {fields.map(f=>(
            <input key={f.k} value={form[f.k]} onChange={e=>setForm(fm=>({...fm,[f.k]:e.target.value}))}
              placeholder={f.p} style={{...inp,marginBottom:10,fontSize:13}}/>
          ))}
          <textarea value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))}
            placeholder={lang==="it"?"Descrizione della tua attività...":"Describe your business..."}
            style={{...inp,resize:"none",height:70,fontSize:13,marginBottom:0}}/>
        </div>

        <div style={card}>
          <p style={{margin:"0 0 10px",fontSize:11,color:"#6b7280",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>{tx.typeLabel}</p>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {types.map(tp=>(
              <button key={tp} onClick={()=>setForm(f=>({...f,type:tp}))}
                style={{background:form.type===tp?"#1a5c3a":"#f3f4f6",color:form.type===tp?"white":"#374151",border:"none",padding:"7px 12px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:form.type===tp?700:400}}>
                {typeEmojis[tp]} {tp}
              </button>
            ))}
          </div>
        </div>

        <div style={card}>
          <p style={{margin:"0 0 10px",fontSize:11,color:"#6b7280",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>{tx.openLabel}</p>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {Object.entries(MEALS).map(([k,m])=>(
              <button key={k} onClick={()=>toggleMeal(k)}
                style={{background:form.meals.includes(k)?"#1f2937":"#f3f4f6",color:form.meals.includes(k)?"white":"#374151",border:"none",padding:"7px 12px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:form.meals.includes(k)?700:400}}>
                {m.icon} {m[lang==="it"?"it":"en"]}
              </button>
            ))}
          </div>
        </div>

        <div style={card}>
          <p style={{margin:"0 0 10px",fontSize:11,color:"#6b7280",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>{tx.offersLabel}</p>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {DIET_TAGS.map(k=>(
              <button key={k} onClick={()=>toggleTag(k)}
                style={{background:form.tags.includes(k)?TAGS[k].color:"#f3f4f6",color:form.tags.includes(k)?"white":"#374151",border:"none",padding:"7px 12px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:form.tags.includes(k)?700:400}}>
                {TAGS[k].icon} {TAGS[k][lang==="it"?"it":"en"]}
              </button>
            ))}
          </div>
        </div>

        <div style={card}>
          <p style={{margin:"0 0 4px",fontSize:11,color:"#6b7280",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>{tx.kitchenLabel}</p>
          <p style={{margin:"0 0 10px",fontSize:12,color:"#9ca3af"}}>{tx.kitchenSub}</p>
          {CROSS_TAGS.map(k=>(
            <div key={k} onClick={()=>setCross(k)}
              style={{border:"2px solid "+(form.cross===k?TAGS[k].color:"#e5e7eb"),borderRadius:12,padding:"10px 14px",cursor:"pointer",marginBottom:8,background:form.cross===k?TAGS[k].color+"11":"white",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:18}}>{TAGS[k].icon}</span>
              <div>
                <p style={{margin:"0 0 2px",fontWeight:700,fontSize:13,color:TAGS[k].color}}>{TAGS[k][lang==="it"?"it":"en"]}</p>
                <p style={{margin:0,fontSize:11,color:"#6b7280"}}>{CROSS_DESC[lang][k]}</p>
              </div>
            </div>
          ))}
        </div>

        <div style={{...card,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <p style={{margin:"0 0 3px",fontWeight:700,fontSize:13,color:"#1a5c3a"}}>{tx.badgeLabel}</p>
            <p style={{margin:0,fontSize:11,color:"#6b7280"}}>{tx.badgeSub}</p>
          </div>
          <div onClick={()=>setForm(f=>({...f,certified:!f.certified}))}
            style={{width:44,height:24,borderRadius:12,background:form.certified?"#1a5c3a":"#e5e7eb",cursor:"pointer",position:"relative",flexShrink:0}}>
            <div style={{width:18,height:18,borderRadius:"50%",background:"white",position:"absolute",top:3,left:form.certified?23:3,transition:"left 0.2s"}}/>
          </div>
        </div>

        <button onClick={()=>form.email&&setSent(true)} style={{...btnG2,opacity:form.email?1:0.5,fontSize:16,padding:"15px"}}>
          🌿 {tx.send}
        </button>
        <p style={{textAlign:"center",fontSize:11,color:"#9ca3af",marginTop:8}}>{tx.reply}</p>
      </div>
    </div>
  );
}

// ── APP ──
function App(){
  const [lang,setLang]=React.useState("it");
  const [screen,setScreen]=React.useState("welcome");
  const [authMode,setAuthMode]=React.useState("login");
  const [user,setUser]=React.useState(null);
  const [premium,setPremium]=React.useState(false);
  const [q,setQ]=React.useState("");
  const [tagFilters,setTagFilters]=React.useState([]);
  const [mealFilter,setMealFilter]=React.useState(null);
  const [results,setResults]=React.useState([]);
  const [sel,setSel]=React.useState(null);
  const [prevScr,setPrevScr]=React.useState("home");
  const [cnt,setCnt]=React.useState(0);
  const [popup,setPopup]=React.useState(null);
  const [showUp,setShowUp]=React.useState(false);
  const [revs,setRevs]=React.useState({
    1:[{id:1,user:"Marco R.",rating:5,text:"Ottimo! Molto attenti alle intolleranze.",date:"2024-03-15"}],
    4:[{id:1,user:"Lucia V.",rating:5,text:"Finalmente un posto sicuro per chi è intollerante a glutine e lattosio!",date:"2024-04-01"}],
  });

        </div>
        {/* FILTRI */}
        <div style={card}>
          <p style={{margin:"0 0 7px",fontSize:11,color:"#6b7280",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>{t.mealFilter}</p>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
            <button onClick={()=>setMealFilter(null)} style={{background:!mealFilter?"#1f2937":"#f3f4f6",color:!mealFilter?"white":"#374151",border:"none",padding:"6px 11px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:!mealFilter?700:400}}>🍽️ {t.allMeals}</button>
            {Object.entries(MEALS).map(([k,m])=>(
              <button key={k} onClick={()=>isGuest?showP(t.popGuest,t.popGuestSub,"register"):setMealFilter(mealFilter===k?null:k)}
                style={{background:mealFilter===k?"#1f2937":"#f3f4f6",color:mealFilter===k?"white":"#374151",border:"none",padding:"6px 11px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:mealFilter===k?700:400}}>
                {m.icon} {m[lang]}
              </button>
            ))}
          </div>
          <p style={{margin:"0 0 7px",fontSize:11,color:"#6b7280",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>{t.filters}</p>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
            {DIET_TAGS.map(k=>(
              <button key={k} onClick={()=>isGuest?showP(t.popGuest,t.popGuestSub,"register"):toggleTag(k)}
                style={{background:tagFilters.includes(k)?TAGS[k].color:"#f3f4f6",color:tagFilters.includes(k)?"white":"#374151",border:"none",padding:"6px 11px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:tagFilters.includes(k)?700:400}}>
                {TAGS[k].icon} {TAGS[k][lang]}
              </button>
            ))}
          </div>
          <p style={{margin:"0 0 4px",fontSize:11,color:"#6b7280",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>{t.kitchenTitle}</p>
          <p style={{margin:"0 0 8px",fontSize:11,color:"#9ca3af"}}>{t.kitchenSub}</p>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:5}}>
            {CROSS_TAGS.map(k=>(
              <button key={k} onClick={()=>isGuest?showP(t.popGuest,t.popGuestSub,"register"):toggleTag(k)}
                style={{background:tagFilters.includes(k)?TAGS[k].color:"#f3f4f6",color:tagFilters.includes(k)?"white":"#374151",border:"none",padding:"6px 11px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:tagFilters.includes(k)?700:400}}>
                {TAGS[k].icon} {TAGS[k][lang]}
              </button>
            ))}
          </div>
          <p style={{margin:"0 0 14px",fontSize:10,color:"#9ca3af"}}>{t.kitchenLegend}</p>
          <button onClick={doSearch} style={{...btnG,display:"flex",alignItems:"center",justifyContent:"center",gap:8,fontSize:16,padding:"14px"}}>
            🔍 {t.searchBtn}
            {(tagFilters.length>0||mealFilter||q)&&<span style={{background:"rgba(255,255,255,0.25)",fontSize:12,padding:"2px 9px",borderRadius:10}}>{[q&&1,...tagFilters,mealFilter].filter(Boolean).length} {lang==="it"?"filtri":"filters"}</span>}
          </button>
        </div>
        {isGuest&&<div style={{background:"#fef3c7",borderRadius:12,padding:"9px 14px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:12,color:"#92400e"}}>👀 {lang==="it"?"Ospite: solo 2 strutture visibili":"Guest: only 2 structures visible"}</span>
          <span onClick={()=>{setAuthMode("register");go("auth");}} style={{fontSize:12,color:"#d97706",cursor:"pointer",fontWeight:700}}>{t.regFree} →</span>
        </div>}
        {!isGuest&&!premium&&<div style={{background:"#fef3c7",borderRadius:12,padding:"9px 14px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:12,color:"#92400e"}}>🔍 {t.freeBanner} ({cnt}/{FREE_LIMIT})</span>
          <span onClick={()=>setShowUp(true)} style={{fontSize:12,color:"#d97706",cursor:"pointer",fontWeight:700}}>{t.upgrade} →</span>
        </div>}
        <h3 style={{fontSize:14,fontWeight:700,color:"#1f2937",margin:"4px 0 10px"}}>📢 {t.featured}</h3>
        {sorted.filter(s=>s.sponsored).map((s,i)=><StructCard key={s.id} s={s} index={i} guestMode={isGuest}/>)}
        <h3 style={{fontSize:14,fontWeight:700,color:"#1f2937",margin:"14px 0 10px"}}>🇮🇹 {t.nearby}</h3>
        {sorted.filter(s=>s.country==="Italia"&&!s.sponsored).slice(0,5).map((s,i)=><StructCard key={s.id} s={s} index={i+2} guestMode={isGuest}/>)}
        {isGuest&&<div onClick={()=>{setAuthMode("register");go("auth");}} style={{background:GREEN,color:"white",borderRadius:14,padding:18,textAlign:"center",cursor:"pointer",marginBottom:10}}>
          <p style={{margin:"0 0 4px",fontWeight:700,fontSize:14}}>🌿 {t.popGuest}</p>
          <p style={{margin:"0 0 12px",fontSize:13,opacity:.9}}>{t.popGuestSub}</p>
          <button style={{background:"white",color:"#1a5c3a",border:"none",padding:"9px 18px",borderRadius:20,fontWeight:700,cursor:"pointer",fontSize:13}}>{t.regFree}</button>
        </div>}
      </div>
      <BottomNav/>{showUp&&<UpgradeModal/>}<Popup/>
    </div>
  );

  // RESULTS
  if(screen==="results")return(
    <div style={{background:"#f9fafb",minHeight:"100vh",paddingBottom:80}}>
      <div style={{background:GREEN,padding:"20px",color:"white"}}>
        <button onClick={()=>{go("home");setTab("home");}} style={{...ghost,marginBottom:10,display:"block"}}>← {t.back}</button>
        <h2 style={{margin:"0 0 4px",fontSize:17,fontWeight:800}}>🔍 {t.results}</h2>
        <p style={{margin:0,fontSize:13,opacity:.85}}>{results.length} {t.found}</p>
      </div>
      <div style={{padding:16}}>
        {results.length===0
          ?<div style={{textAlign:"center",padding:"60px 20px"}}><div style={{fontSize:48}}>😕</div><h3 style={{color:"#6b7280",marginTop:12}}>{t.noResults}</h3></div>
          :<>
            {results.map(s=><StructCard key={s.id} s={s} index={0} guestMode={false}/>)}
            {!premium&&results.length>=FREE_STRUCTS&&<div onClick={()=>setShowUp(true)} style={{background:GREEN,color:"white",borderRadius:14,padding:18,textAlign:"center",cursor:"pointer"}}>
              <p style={{margin:"0 0 4px",fontWeight:700}}>🔒 {t.popLimit}</p>
              <p style={{margin:"0 0 12px",fontSize:13,opacity:.9}}>{t.popLimitSub}</p>
              <button style={{background:"white",color:"#1a5c3a",border:"none",padding:"9px 18px",borderRadius:20,fontWeight:700,cursor:"pointer"}}>⭐ {t.upgradeNow}</button>
            </div>}
          </>
        }
      </div>
      <BottomNav/>{showUp&&<UpgradeModal/>}<Popup/>
    </div>
  );

  // DETAIL
  if(screen==="detail"&&sel){
    const s=sel,sRevs=revs[s.id]||[];
    return(
      <div style={{background:"#f9fafb",minHeight:"100vh",paddingBottom:80}}>
        <div style={{background:GREEN,padding:"20px 20px 36px",color:"white"}}>
          <button onClick={()=>go(prevScr)} style={{...ghost,marginBottom:12,display:"block"}}>← {t.back}</button>
          <div style={{display:"flex",gap:14,alignItems:"center"}}>
            <div style={{fontSize:40,background:"rgba(255,255,255,.15)",borderRadius:16,width:68,height:68,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{s.emoji}</div>
            <div>
              <h2 style={{margin:"0 0 4px",fontSize:18,fontWeight:800}}>{s.name}</h2>
              <p style={{margin:"0 0 6px",fontSize:13,opacity:.85}}>📍 {s.city}, {s.country}</p>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                <SrcBadge source={s.source}/>
                {s.certified&&<span style={{background:"rgba(255,255,255,.25)",color:"white",fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:10}}>✅ {t.certified}</span>}
              </div>
            </div>
          </div>
        </div>
        <div style={{padding:"0 16px",marginTop:-14}}>
          <div style={card}>
            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
              {(s.meals||[]).map(m=><span key={m} style={{background:"#fef9ec",color:"#d97706",fontSize:13,padding:"5px 11px",borderRadius:20,fontWeight:600}}>{MEALS[m]?.icon} {MEALS[m]?.[lang]}</span>)}
            </div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {s.tags.map(k=><span key={k} style={{background:TAGS[k]?.color+"22",color:TAGS[k]?.color,fontSize:12,padding:"4px 10px",borderRadius:20,fontWeight:600}}>{TAGS[k]?.icon} {TAGS[k]?.[lang]}</span>)}
            </div>
          </div>
          <div style={card}>
            <p style={{margin:"0 0 10px",fontSize:14,color:"#374151",lineHeight:1.6}}>{s.description}</p>
            <div style={{borderTop:"1px solid #f3f4f6",paddingTop:10,display:"flex",flexDirection:"column",gap:5}}>
              <p style={{margin:0,fontSize:13,color:"#6b7280"}}>📍 {s.address}</p>
              {s.phone&&<p style={{margin:0,fontSize:13,color:"#6b7280"}}>📞 {s.phone}</p>}
              {s.rating&&<div style={{display:"flex",alignItems:"center",gap:5}}>
                <span style={{color:"#f59e0b"}}>{"⭐".repeat(Math.round(s.rating))}</span>
                <span style={{fontSize:13,fontWeight:700}}>{s.rating}</span>
                <span style={{fontSize:12,color:"#9ca3af"}}>({s.reviewCount} {t.reviews})</span>
              </div>}
            </div>
          </div>
          <div style={card}>
            <h3 style={{margin:"0 0 12px",fontSize:14,fontWeight:700}}>💬 {t.reviews} ({sRevs.length})</h3>
            {sRevs.length===0?<p style={{color:"#9ca3af",fontSize:14,textAlign:"center",padding:"8px 0"}}>{t.noRev}</p>
              :sRevs.map((r,i)=>(
                <div key={r.id} style={{borderBottom:i<sRevs.length-1?"1px solid #f3f4f6":"none",paddingBottom:10,marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                    <span style={{fontWeight:600,fontSize:13}}>{r.user}</span>
                    <span style={{fontSize:11,color:"#9ca3af"}}>{r.date}</span>
                  </div>
                  <div style={{marginBottom:3,fontSize:13}}>{"⭐".repeat(r.rating)}</div>
                  <p style={{margin:0,fontSize:13,color:"#374151"}}>{r.text}</p>
                </div>
              ))
            }
            <div style={{borderTop:"1px solid #f3f4f6",marginTop:12,paddingTop:12}}>
              {isGuest?<div onClick={()=>showP(t.popReview,t.popReviewSub,"register")} style={{background:"#f0fdf4",borderRadius:12,padding:14,textAlign:"center",cursor:"pointer",border:"2px dashed #a7f3d0"}}>
                <p style={{margin:"0 0 4px",fontWeight:600,color:"#1a5c3a",fontSize:13}}>💬 {t.popReview}</p>
                <p style={{margin:0,fontSize:12,color:"#6b7280"}}>{t.popReviewSub}</p>
              </div>:revOk?<div style={{background:"#d1fae5",color:"#065f46",padding:10,borderRadius:10,fontSize:14,fontWeight:600,textAlign:"center"}}>{t.reviewAdded}</div>:<>
                <h4 style={{margin:"0 0 8px",fontSize:13,fontWeight:600}}>✏️ {t.leaveReview}</h4>
                <div style={{display:"flex",gap:3,marginBottom:8}}>
                  {[1,2,3,4,5].map(star=><button key={star} onClick={()=>setNr(r=>({...r,rating:star}))} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",opacity:star<=nr.rating?1:0.3,padding:0}}>⭐</button>)}
                </div>
                <textarea value={nr.text} onChange={e=>setNr(r=>({...r,text:e.target.value}))} placeholder={t.placeholder}
                  style={{width:"100%",padding:10,borderRadius:10,border:"1px solid #e5e7eb",fontSize:14,resize:"none",height:75,boxSizing:"border-box",fontFamily:"inherit",outline:"none"}}/>
                <button onClick={()=>addRev(s.id)} style={{...btnG,marginTop:8,fontSize:14}}>{t.submit}</button>
              </>}
            </div>
          </div>
        </div>
        <BottomNav/><Popup/>
      </div>
    );
  }

  // PROFILE
  if(screen==="profile")return(
    <div style={{background:"#f9fafb",minHeight:"100vh",paddingBottom:80}}>
      <div style={{background:GREEN,padding:"36px 20px 56px",textAlign:"center",color:"white"}}>
        <div style={{fontSize:44,background:"rgba(255,255,255,.15)",borderRadius:"50%",width:70,height:70,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px"}}>👤</div>
        <h2 style={{margin:"0 0 4px",fontSize:18,fontWeight:800}}>{user?.name}</h2>
        <p style={{margin:0,fontSize:13,opacity:.85}}>{user?.email}</p>
        {premium&&<span style={{display:"inline-block",marginTop:10,background:"#f59e0b",padding:"4px 12px",borderRadius:15,fontSize:13,fontWeight:700}}>⭐ Premium</span>}
      </div>
      <div style={{padding:"0 16px",marginTop:-18}}>
        <div style={card}>
          {premium?<div style={{background:"#d1fae5",borderRadius:12,padding:14}}>
            <p style={{margin:"0 0 4px",fontWeight:700,color:"#065f46"}}>⭐ {t.premiumPlan}</p>
            <p style={{margin:0,fontSize:13,color:"#047857"}}>{t.features}</p>
          </div>:<>
            <div style={{background:"#f9fafb",borderRadius:12,padding:12,marginBottom:10}}>
              <p style={{margin:"0 0 8px",fontSize:13,color:"#6b7280"}}>{lang==="it"?"3 ricerche/mese · Max 5 strutture":"3 searches/month · Max 5 structures"}</p>
              <div style={{background:"#e5e7eb",borderRadius:10,height:6,overflow:"hidden",marginBottom:4}}>
                <div style={{background:cnt>=FREE_LIMIT?"#ef4444":"#1a5c3a",height:"100%",width:`${Math.min((cnt/FREE_LIMIT)*100,100)}%`}}/>
              </div>
              <p style={{margin:0,fontSize:11,color:"#6b7280"}}>{cnt}/{FREE_LIMIT} {t.searchesUsed.toLowerCase()}</p>
            </div>
            <button onClick={()=>setShowUp(true)} style={btnG}>⭐ {t.upgradeNow}</button>
          </>}
        </div>
        <div style={card}>
          <button onClick={tl} style={{width:"100%",background:"#f9fafb",border:"none",padding:12,borderRadius:10,fontSize:14,cursor:"pointer",color:"#374151",textAlign:"left",marginBottom:8}}>
            🌐 {lang==="it"?"Switch to English":"Passa all'italiano"}
          </button>
          <button onClick={()=>{setUser(null);setScreen("welcome");setPremium(false);setCnt(0);setTab("home");}} style={{width:"100%",background:"#fef2f2",border:"none",padding:12,borderRadius:10,fontSize:14,cursor:"pointer",color:"#ef4444",textAlign:"left"}}>
            🚪 {t.logout}
          </button>
        </div>
      </div>
      <BottomNav/>{showUp&&<UpgradeModal/>}
    </div>
  );

  return null;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
