function AdminScreen({user,lang,go,sb}){
  const [tab,setTab]=React.useState("requests");
  const [requests,setRequests]=React.useState([]);
  const [structures,setStructures]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [msg,setMsg]=React.useState("");
  const ghost2={background:"rgba(255,255,255,0.2)",border:"none",color:"white",padding:"6px 12px",borderRadius:20,cursor:"pointer",fontSize:13};
  const card2={background:"white",borderRadius:14,padding:16,boxShadow:"0 2px 12px rgba(0,0,0,.07)",marginBottom:10};
  const [tagSuggestions,setTagSuggestions]=React.useState([]);
  const load=async()=>{
    setLoading(true);
    const [rReq,rStr,rTags]=await Promise.all([
      sb.from("business_requests").select("*").order("created_at",{ascending:false}),
      sb.from("structures").select("*").order("created_at",{ascending:false}),
      sb.from("tag_suggestions").select("*").order("created_at",{ascending:false}),
    ]);
    if(rReq.data)setRequests(rReq.data);
    if(rStr.data)setStructures(rStr.data);
    if(rTags.data)setTagSuggestions(rTags.data);
    setLoading(false);
  };
  const approveTag=async(suggestion)=>{
    // 🌿 NUOVO: Se è un locale Google (ID inizia con g_), crealo automaticamente!
    if(suggestion.structure_id && suggestion.structure_id.startsWith("g_")){
      // Controlla se il locale esiste già
      const {data:existing}=await sb.from("structures")
        .select("id")
        .eq("id",suggestion.structure_id)
        .maybeSingle();
      
      // Se NON esiste, crealo ADESSO!
      if(!existing){
        console.log("📍 Creo locale Google:", suggestion.structure_name);
        await sb.from("structures").insert({
          id: suggestion.structure_id,
          name: suggestion.structure_name || "Locale",
          city: "Italia",
          type: "ristorante",
          source: "google",
          pending: false,
          country: "Italia",
          description: suggestion.structure_name || "",
          // Aggiungi il tag specifico come colonna boolean
          gluten_free: suggestion.tag === "gluten_free",
          lactose_free: suggestion.tag === "lactose_free",
          combo_free: suggestion.tag === "combo_free",
          vegan: suggestion.tag === "vegan",
          vegetarian: suggestion.tag === "vegetarian",
          pet_friendly: suggestion.tag === "pet_friendly"
        });
      }
    }
    
    // 🌿 Approva il tag in community_tags (come prima)
    const r1=await sb.from("community_tags").upsert(
      {structure_id:suggestion.structure_id,tag:suggestion.tag,count:1},
      {onConflict:"structure_id,tag",ignoreDuplicates:false}
    );
    const r2=await sb.from("tag_suggestions").update({status:"approved"}).eq("id",suggestion.id);
    
    if(r1.error||r2.error){
      showMsg("❌ Errore: "+(r1.error?.message||r2.error?.message));
    } else {
      showMsg("✅ Tag approvato e locale salvato!");
      load();
    }
  };  const rejectTag=async(id)=>{
    await sb.from("tag_suggestions").update({status:"rejected"}).eq("id",id);
    showMsg("❌ Tag rifiutato");load();
  };
  React.useEffect(()=>{load();},[tab]);
  const showMsg=(m)=>{setMsg(m);setTimeout(()=>setMsg(""),3000);};
  const approveRequest=async(req)=>{
    await sb.from("structures").insert({
      name:req.name,type:req.type,city:req.city,address:req.address,
      phone:req.phone,description:req.description,
      gluten_free:req.tags?.includes("gluten_free")||false,
      lactose_free:req.tags?.includes("lactose_free")||false,
      vegan:req.tags?.includes("vegan")||false,
      vegetarian:req.tags?.includes("vegetarian")||false,
      pet_friendly:req.tags?.includes("pet_friendly")||false,
      combo_free:req.tags?.includes("combo_free")||false,
      kitchen_safety:req.kitchen_safety||"",
      source:"registered",certified:false,sponsored:false,pending:false,
      breakfast:req.meals?.includes("breakfast")||false,
      lunch:req.meals?.includes("lunch")||false,
      aperitivo:req.meals?.includes("aperitivo")||false,
      dinner:req.meals?.includes("dinner")||false,
    });
    await sb.from("business_requests").update({status:"approved"}).eq("id",req.id);
    showMsg("✅ Locale approvato!");load();
  };
  const rejectRequest=async(id)=>{
    await sb.from("business_requests").update({status:"rejected"}).eq("id",id);
    showMsg("❌ Richiesta rifiutata");load();
  };
  const verifyStructure=async(id,verified)=>{
    await sb.from("structures").update({source:verified?"verified":"registered"}).eq("id",id);
    showMsg(verified?"🌿 Badge Verificato assegnato!":"Badge rimosso");load();
  };
  const deleteStructure=async(id)=>{
    if(!window.confirm("Sicura di voler eliminare questo locale?"))return;
    await sb.from("structures").delete().eq("id",id);
    showMsg("🗑️ Locale eliminato");load();
  };
  const tabs=[{id:"requests",label:"📋 Richieste"},{id:"structures",label:"🏢 Locali"},{id:"tags",label:"🏷️ Tag"},{id:"stats",label:"📊 Stats"}];
  return(
    <div style={{minHeight:"100vh",background:"#f9fafb",paddingBottom:40}}>
      <div style={{background:GREEN,padding:"20px",color:"white"}}>
        <button onClick={()=>go("profile")} style={{...ghost2,marginBottom:10,display:"block"}}>← Indietro</button>
        <Logo size={20}/>
        <h2 style={{margin:"8px 0 2px",fontSize:17,fontWeight:700}}>⚙️ Pannello Admin</h2>
        <p style={{margin:0,fontSize:12,opacity:.8}}>Ciao {user?.name} 👋</p>
      </div>
      {msg&&<div style={{background:"#d1fae5",color:"#065f46",padding:"10px 16px",fontWeight:600,fontSize:13,textAlign:"center"}}>{msg}</div>}
      <div style={{display:"flex",borderBottom:"2px solid #e5e7eb",background:"white"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"12px 4px",border:"none",background:"none",fontSize:12,fontWeight:tab===t.id?700:400,color:tab===t.id?"#1a5c3a":"#6b7280",borderBottom:tab===t.id?"2px solid #1a5c3a":"none",cursor:"pointer"}}>{t.label}</button>
        ))}
      </div>
      <div style={{padding:16}}>
        {loading&&<div style={{textAlign:"center",padding:30,color:"#6b7280"}}>🔄 Caricamento...</div>}
        {!loading&&tab==="requests"&&<>
          <p style={{fontSize:13,color:"#6b7280",marginBottom:12}}>{requests.filter(r=>!r.status||r.status==="pending").length} richieste in attesa</p>
          {requests.map(req=>(
            <div key={req.id} style={{...card2,borderLeft:`4px solid ${!req.status||req.status==="pending"?"#f59e0b":req.status==="approved"?"#10b981":"#ef4444"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <p style={{margin:"0 0 2px",fontWeight:700,fontSize:14}}>{req.name}</p>
                  <p style={{margin:"0 0 2px",fontSize:12,color:"#6b7280"}}>📍 {req.city} · {req.type}</p>
                  <p style={{margin:"0 0 2px",fontSize:12,color:"#6b7280"}}>📧 {req.email}</p>
                  {req.phone&&<p style={{margin:"0 0 2px",fontSize:12,color:"#6b7280"}}>📞 {req.phone}</p>}
                  {req.description&&<p style={{margin:"0 0 4px",fontSize:12,color:"#374151"}}>{req.description}</p>}
                  <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:4}}>
                    {(req.tags||[]).map(t=><span key={t} style={{background:"#f0fdf4",color:"#1a5c3a",fontSize:10,padding:"2px 6px",borderRadius:8}}>{t}</span>)}
                  </div>
                </div>
                <span style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:10,background:!req.status||req.status==="pending"?"#fef3c7":req.status==="approved"?"#d1fae5":"#fee2e2",color:!req.status||req.status==="pending"?"#92400e":req.status==="approved"?"#065f46":"#dc2626"}}>
                  {!req.status||req.status==="pending"?"⏳ Attesa":req.status==="approved"?"✅ Approvato":"❌ Rifiutato"}
                </span>
              </div>
              {(!req.status||req.status==="pending")&&<div style={{display:"flex",gap:8}}>
                <button onClick={()=>approveRequest(req)} style={{flex:1,background:"#1a5c3a",color:"white",border:"none",padding:"8px",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:13}}>✅ Approva</button>
                <button onClick={()=>rejectRequest(req.id)} style={{flex:1,background:"#fee2e2",color:"#dc2626",border:"none",padding:"8px",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:13}}>❌ Rifiuta</button>
              </div>}
            </div>
          ))}
          {requests.length===0&&<div style={{textAlign:"center",padding:30,color:"#9ca3af"}}>Nessuna richiesta</div>}
        </>}
        {!loading&&tab==="structures"&&<>
          <p style={{fontSize:13,color:"#6b7280",marginBottom:12}}>{structures.length} locali nel database</p>
          {structures.map(s=>(
            <div key={s.id} style={card2}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <p style={{margin:"0 0 2px",fontWeight:700,fontSize:14}}>{s.name}</p>
                  <p style={{margin:0,fontSize:12,color:"#6b7280"}}>📍 {s.city} · {s.type}</p>
                </div>
                <span style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:10,background:s.source==="verified"?"#dbeafe":s.source==="registered"?"#e8f5ee":"#f3f4f6",color:s.source==="verified"?"#2563eb":s.source==="registered"?"#1a5c3a":"#6b7280"}}>
                  {s.source==="verified"?"🌿 Verificato":s.source==="registered"?"🏢 Registrato":"📍 Google"}
                </span>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>verifyStructure(s.id,s.source!=="verified")} style={{flex:1,background:s.source==="verified"?"#fef3c7":"#dbeafe",color:s.source==="verified"?"#92400e":"#2563eb",border:"none",padding:"7px",borderRadius:10,cursor:"pointer",fontSize:12,fontWeight:700}}>
                  {s.source==="verified"?"🏢 Rimuovi badge":"🌿 Assegna Verificato"}
                </button>
                <button onClick={()=>deleteStructure(s.id)} style={{background:"#fee2e2",color:"#dc2626",border:"none",padding:"7px 12px",borderRadius:10,cursor:"pointer",fontSize:13}}>🗑️</button>
              </div>
            </div>
          ))}
          {structures.length===0&&<div style={{textAlign:"center",padding:30,color:"#9ca3af"}}>Nessun locale</div>}
        </>}
        {!loading&&tab==="tags"&&<>
          <p style={{fontSize:13,color:"#6b7280",marginBottom:12}}>{tagSuggestions.filter(t=>t.status==="pending").length} segnalazioni in attesa</p>
          {tagSuggestions.map(s=>(
            <div key={s.id} style={{...card2,borderLeft:`4px solid ${s.status==="pending"?"#f59e0b":s.status==="approved"?"#10b981":"#ef4444"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <p style={{margin:"0 0 2px",fontWeight:700,fontSize:14}}>{TAGS[s.tag]?.icon} {TAGS[s.tag]?.it} per <em>{s.structure_name||s.structure_id}</em></p>
                  <p style={{margin:"0 0 2px",fontSize:12,color:"#6b7280"}}>👤 {s.user_name} · {s.created_at?.split("T")[0]}</p>
                </div>
                <span style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:10,background:s.status==="pending"?"#fef3c7":s.status==="approved"?"#d1fae5":"#fee2e2",color:s.status==="pending"?"#92400e":s.status==="approved"?"#065f46":"#dc2626"}}>
                  {s.status==="pending"?"⏳ Attesa":s.status==="approved"?"✅ Approvato":"❌ Rifiutato"}
                </span>
              </div>
              {s.status==="pending"&&<div style={{display:"flex",gap:8}}>
                <button onClick={()=>approveTag(s)} style={{flex:1,background:"#1a5c3a",color:"white",border:"none",padding:"8px",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:13}}>✅ Approva e pubblica</button>
                <button onClick={()=>rejectTag(s.id)} style={{flex:1,background:"#fee2e2",color:"#dc2626",border:"none",padding:"8px",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:13}}>❌ Rifiuta</button>
              </div>}
            </div>
          ))}
          {tagSuggestions.length===0&&<div style={{textAlign:"center",padding:30,color:"#9ca3af"}}>Nessuna segnalazione</div>}
        </>}
        {!loading&&tab==="stats"&&<>
          {[
            {label:"Locali totali",value:structures.length,icon:"🏢"},
            {label:"Locali verificati",value:structures.filter(s=>s.source==="verified").length,icon:"🌿"},
            {label:"Richieste in attesa",value:requests.filter(r=>!r.status||r.status==="pending").length,icon:"⏳"},
            {label:"Richieste approvate",value:requests.filter(r=>r.status==="approved").length,icon:"✅"},
          ].map((s,i)=>(
            <div key={i} style={{...card2,display:"flex",alignItems:"center",gap:16}}>

  const searchGooglePlaces=async(query,tags)=>{
    // NON aggiungo i tag alla query - trovo TUTTI i locali e filtro dalle recensioni
    const loc=(query||"Maremma Grosseto")+" Italia";
    const hasFood=query&&["ristorante","bar","pizzeria","agriturismo"].some(w=>query.toLowerCase().includes(w));
    // Se c'è un filtro tipo locale, cerca solo quel tipo
    const queries=venueType
      ?[venueType+" "+loc]
      :hasFood?[query+" "+loc]:["ristorante "+loc,"bar caffè "+loc,"pizzeria trattoria osteria agriturismo "+loc,"gelateria pasticceria "+loc];
    const mapPlace=(p)=>{
      const pt=p.primaryType||"";
      let type="ristorante",emoji="🍽️";
      if(pt.includes("bar")||pt.includes("cafe")){type="bar";emoji="☕";}
      else if(pt.includes("bakery")||pt.includes("pastry")){type="pasticceria";emoji="🧁";}
      else if(pt.includes("lodging")||pt.includes("hotel")){type="hotel";emoji="🏨";}
      else if(pt.includes("farm")||pt.includes("campground")){type="agriturismo";emoji="🌾";}
      else if(pt.includes("pizza")){type="pizzeria";emoji="🍕";}
      else if(pt.includes("ice_cream")||pt.includes("gelat")){type="gelateria";emoji="🍦";}
      const name=(p.displayName?.text||p.displayName||"Locale");
      const nl=name.toLowerCase();
      if(nl.includes("gelat")||nl.includes("gelateria")){type="gelateria";emoji="🍦";}
      const addr=p.shortFormattedAddress||p.formattedAddress||"";
      const parts=(p.formattedAddress||"").split(",");
      const city=parts.length>2?parts[parts.length-3]?.trim()||"Italia":"Italia";
      return{id:"g_"+(p.id||Math.random().toString(36)),name,type,city,country:"Italia",address:addr,phone:"",description:type+" · "+city,emoji,tags:[],lat:p.location?.latitude||null,lng:p.location?.longitude||null,meals:type==="bar"?["breakfast","aperitivo"]:type==="gelateria"||type==="pasticceria"?["breakfast","lunch","aperitivo"]:["lunch","dinner"],source:"google",certified:false,sponsored:false,rating:p.rating||null,reviewCount:p.userRatingCount||0,unverified:true};
    };
    try{
      const results=await Promise.all(queries.map(textQuery=>
        fetch("https://places.googleapis.com/v1/places:searchText",{
          method:"POST",
          headers:{"Content-Type":"application/json","X-Goog-Api-Key":GKEY,"X-Goog-FieldMask":"places.id,places.displayName,places.formattedAddress,places.rating,places.userRatingCount,places.primaryType,places.shortFormattedAddress,places.location"},
          body:JSON.stringify({textQuery,languageCode:"it",maxResultCount:20})
        }).then(r=>r.ok?r.json():{places:[]}).then(d=>(d.places||[]).map(mapPlace)).catch(()=>[])
      ));
      const seen=new Set();
      return results.flat().filter(p=>{
        if(seen.has(p.name.toLowerCase()))return false;
        seen.add(p.name.toLowerCase());
        if(venueType&&p.type!==venueType)return false;
        return true;
      });
    }catch(e){return[];}
  };

              {(s.tags||[]).map(k=><span key={k} style={{background:TAGS[k]?.color+"22",color:TAGS[k]?.color,fontSize:12,padding:"4px 10px",borderRadius:20,fontWeight:600}}>{TAGS[k]?.icon} {TAGS[k]?.[lang]}</span>)}
            </div>
            {s.reviewTags&&s.reviewTags.length>0&&<div style={{marginTop:8}}><p style={{margin:"0 0 6px",fontSize:11,color:"#6b7280",fontWeight:700}}>💬 {lang==="it"?"Segnalato nelle recensioni:":"Mentioned in reviews:"}</p><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{s.reviewTags.map(k=><span key={k} style={{background:"#fef9ec",color:"#92400e",fontSize:11,padding:"3px 8px",borderRadius:20,border:"1px dashed #fcd34d"}}>💬 {TAGS[k]?.[lang]}</span>)}</div><p style={{margin:"6px 0 0",fontSize:10,color:"#9ca3af"}}>{lang==="it"?"Dalle recensioni Google, non verificato":"From Google reviews, not verified"}</p></div>}
            {communityTags[s.id]&&Object.keys(communityTags[s.id]).filter(k=>communityTags[s.id][k].count>0).length>0&&<div style={{marginTop:8,background:"#f0fdf4",borderRadius:10,padding:"8px 10px",border:"1px solid #bbf7d0"}}><p style={{margin:"0 0 6px",fontSize:11,color:"#1a5c3a",fontWeight:700}}>👥 {lang==="it"?"Segnalato dalla community:":"Reported by community:"}</p><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{Object.entries(communityTags[s.id]).filter(([k,v])=>v.count>0).map(([k,v])=><span key={k} style={{background:"white",color:"#1a5c3a",fontSize:11,padding:"3px 8px",borderRadius:20,border:"1px solid #bbf7d0",fontWeight:600}}>{TAGS[k]?.icon} {TAGS[k]?.[lang]} · {v.count}</span>)}</div><p style={{margin:"6px 0 0",fontSize:10,color:"#6b7280"}}>{lang==="it"?"Segnalato dagli utenti, non garantito":"Reported by users, not guaranteed"}</p></div>}
            <div style={{marginTop:8}}><p style={{margin:"0 0 6px",fontSize:11,color:"#9ca3af"}}>{lang==="it"?"+ Segnala una caratteristica:":"+ Report a feature:"}</p><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{DIET_TAGS.map(k=>{const ct=communityTags[s.id]?.[k];const hasVoted=ct?.users?.includes(user?.id);return <button key={k} onClick={()=>addCommunityTag(s.id,s.name,k)} style={{background:hasVoted?"#fef3c7":"#f9fafb",color:hasVoted?"#92400e":"#9ca3af",border:`1px solid ${hasVoted?"#fcd34d":"#e5e7eb"}`,padding:"4px 10px",borderRadius:20,fontSize:11,cursor:"pointer"}}>{TAGS[k].icon} {TAGS[k]?.[lang]}{ct?.count>0?` (${ct.count})`:""}</button>;})} </div></div>
          </div>
          <div style={card}>
            <p style={{margin:"0 0 10px",fontSize:14,color:"#374151",lineHeight:1.6}}>{s.description}</p>
            <div style={{borderTop:"1px solid #f3f4f6",paddingTop:10,display:"flex",flexDirection:"column",gap:5}}>
              <p style={{margin:0,fontSize:13,color:"#6b7280"}}>📍 {s.address}</p>
              {s.phone&&<p style={{margin:0,fontSize:13,color:"#6b7280"}}>📞 {s.phone}</p>}
              {s.rating&&<div style={{display:"flex",alignItems:"center",gap:5}}><span style={{color:"#f59e0b"}}>{"⭐".repeat(Math.round(s.rating))}</span><span style={{fontSize:13,fontWeight:700}}>{s.rating}</span><span style={{fontSize:12,color:"#9ca3af"}}>({s.reviewCount} {t.reviews})</span></div>}
            </div>
          </div>
          <div style={card}>
            <h3 style={{margin:"0 0 12px",fontSize:14,fontWeight:700}}>💬 {t.reviews} ({sRevs.length})</h3>
            {sRevs.length===0?<p style={{color:"#9ca3af",fontSize:14,textAlign:"center",padding:"8px 0"}}>{t.noRev}</p>
            :sRevs.map((r,i)=>(
              <div key={r.id} style={{borderBottom:i<sRevs.length-1?"1px solid #f3f4f6":"none",paddingBottom:10,marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <span style={{fontWeight:600,fontSize:13}}>{r.user}</span>
                    {r.source==="google"&&<span style={{fontSize:10,background:"#f3f4f6",color:"#6b7280",padding:"1px 5px",borderRadius:6}}>Google</span>}
                  </div>
                  <span style={{fontSize:11,color:"#9ca3af"}}>{r.date}</span>
                </div>
                <div style={{marginBottom:3,fontSize:13}}>{"⭐".repeat(r.rating)}</div>
                <p style={{margin:0,fontSize:13,color:"#374151"}}>{r.text}</p>
              </div>
            ))}
            <div style={{borderTop:"1px solid #f3f4f6",marginTop:12,paddingTop:12}}>
              {isGuest?<div onClick={()=>showP(t.popReview,t.popReviewSub,"register")} style={{background:"#f0fdf4",borderRadius:12,padding:14,textAlign:"center",cursor:"pointer",border:"2px dashed #a7f3d0"}}><p style={{margin:"0 0 4px",fontWeight:600,color:"#1a5c3a",fontSize:13}}>💬 {t.popReview}</p><p style={{margin:0,fontSize:12,color:"#6b7280"}}>{t.popReviewSub}</p></div>
              :revOk?<div style={{background:"#d1fae5",color:"#065f46",padding:10,borderRadius:10,fontSize:14,fontWeight:600,textAlign:"center"}}>{t.reviewAdded}</div>
              :<>
                <h4 style={{margin:"0 0 8px",fontSize:13,fontWeight:600}}>✏️ {t.leaveReview}</h4>
                <div style={{display:"flex",gap:3,marginBottom:8}}>{[1,2,3,4,5].map(star=><button key={star} onClick={()=>setNr(r=>({...r,rating:star}))} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",opacity:star<=nr.rating?1:0.3,padding:0}}>⭐</button>)}</div>
                <textarea value={nr.text} onChange={e=>setNr(r=>({...r,text:e.target.value}))} placeholder={t.placeholder} style={{width:"100%",padding:10,borderRadius:10,border:"1px solid #e5e7eb",fontSize:14,resize:"none",height:75,boxSizing:"border-box",fontFamily:"inherit",outline:"none"}}/>
                <button onClick={()=>addRev(s.id)} style={{...btnG,marginTop:8,fontSize:14}}>{t.submit}</button>
              </>}
            </div>
          </div>
        </div>
        <BottomNav/><Popup/><WelcomePopup/>
      </div>
    );
  }

  if(screen==="profile")return(
    <div style={{background:"#f9fafb",minHeight:"100vh",paddingBottom:80}}>
      <div style={{background:GREEN,padding:"36px 20px 56px",textAlign:"center",color:"white"}}>
        <div style={{fontSize:44,background:"rgba(255,255,255,.15)",borderRadius:"50%",width:70,height:70,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px"}}>👤</div>
        <h2 style={{margin:"0 0 4px",fontSize:18,fontWeight:800}}>{user?.name}</h2>
        <p style={{margin:0,fontSize:13,opacity:.85}}>{user?.email}</p>
      </div>
      <div style={{padding:"0 16px",marginTop:-18}}>
        <div style={card}>
        </div>
        <div style={card}>
          <button onClick={tl} style={{width:"100%",background:"#f9fafb",border:"none",padding:12,borderRadius:10,fontSize:14,cursor:"pointer",color:"#374151",textAlign:"left",marginBottom:8}}>🌐 {lang==="it"?"Switch to English":"Passa all'italiano"}</button>
          <button onClick={()=>go("policy")} style={{width:"100%",background:"#f9fafb",border:"none",padding:12,borderRadius:10,fontSize:14,cursor:"pointer",color:"#374151",textAlign:"left",marginBottom:8}}>⚖️ {lang==="it"?"Policy & Termini":"Policy & Terms"}</button>
          {user?.email===ADMIN_EMAIL&&<button onClick={()=>go("admin")} style={{width:"100%",background:"#1a5c3a",color:"white",border:"none",padding:12,borderRadius:10,fontSize:14,cursor:"pointer",textAlign:"left",marginBottom:8,fontWeight:700}}>⚙️ Pannello Admin</button>}
          <div style={{background:"#f0fdf4",borderRadius:12,padding:14,marginBottom:8,border:"1px solid #bbf7d0"}}>
            <p style={{margin:"0 0 6px",fontWeight:700,fontSize:13,color:"#1a5c3a"}}>💬 {lang==="it"?"Hai bisogno di aiuto?":"Need help?"}</p>
            <p style={{margin:"0 0 8px",fontSize:12,color:"#6b7280"}}>{lang==="it"?"Scrivici per qualsiasi problema o domanda.":"Write to us for any issue or question."}</p>
            <a href="mailto:help@juniperapp.eu" style={{display:"block",background:"#1a5c3a",color:"white",padding:"9px 14px",borderRadius:10,fontSize:13,fontWeight:700,textAlign:"center",textDecoration:"none"}}>✉️ help@juniperapp.eu</a>
          </div>

          {/* 🌿 FIX 3: BOTTONE RICHIESTA CANCELLAZIONE ACCOUNT */}
          <button onClick={async()=>{
            if(!window.confirm(lang==="it"
              ?"Vuoi richiedere la cancellazione del tuo account? Riceverai conferma via email."
              :"Request account deletion? You'll receive confirmation via email."))return;
            
            try {
              // Manda email a help@juniperapp.eu con richiesta cancellazione
              await fetch("https://api.resend.com/emails", {
                method: "POST",
                headers: {
                  "Authorization": "Bearer re_SyKDTDZA_BF3UdqT9Tz3GKyDNQQ6JWATQ",
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({
                  from: "Juniper <help@juniperapp.eu>",
                  to: ["help@juniperapp.eu"],
                  subject: "🗑️ Richiesta cancellazione account: " + user.email,
                  html: "<div style='font-family:system-ui,sans-serif;padding:20px'><h2>Richiesta cancellazione account</h2><p><b>Nome:</b> " + user.name + "</p><p><b>Email:</b> " + user.email + "</p><p><b>ID:</b> " + user.id + "</p><p><b>Data richiesta:</b> " + new Date().toLocaleString("it-IT") + "</p></div>"
                })
              });
              
              alert(lang==="it"
                ?"✅ Richiesta inviata! Ti contatteremo a breve a " + user.email
                :"✅ Request sent! We'll contact you soon at " + user.email);
            } catch(e) {
              alert(lang==="it"?"Errore nell'invio. Riprova o contatta help@juniperapp.eu":"Error sending request. Try again or contact help@juniperapp.eu");
            }
          }} style={{width:"100%",background:"#fff7ed",border:"1px solid #fed7aa",padding:12,borderRadius:10,fontSize:14,cursor:"pointer",color:"#c2410c",textAlign:"left",marginBottom:8}}>🗑️ {lang==="it"?"Richiedi cancellazione account":"Request account deletion"}</button>

          <button onClick={async()=>{await sb.auth.signOut();setUser(null);setScreen("welcome");setCnt(0);setTab("home");}} style={{width:"100%",background:"#fef2f2",border:"none",padding:12,borderRadius:10,fontSize:14,cursor:"pointer",color:"#ef4444",textAlign:"left"}}>🚪 {lang==="it"?"Esci":"Sign Out"}</button>
        </div>
      </div>
      <BottomNav/><Popup/><WelcomePopup/>
    </div>
  );

  return null;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
