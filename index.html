  {id:6,name:"Trattoria Bellavista",city:"Napoli",country:"Italia",type:"ristorante",tags:["gluten_free","vegetarian","high_cross"],meals:["lunch","dinner"],certified:false,rating:4.6,reviewCount:178,emoji:"🍕",description:"Autentica pizza napoletana con opzioni gluten free.",address:"Via Tribunali, 45",phone:"+39 081 234567",sponsored:false,source:"google"},
  {id:7,name:"Latteria Moderna",city:"Torino",country:"Italia",type:"bar",tags:["lactose_free","gluten_free","combo_free","no_cross"],meals:["breakfast","lunch"],certified:false,rating:4.5,reviewCount:112,emoji:"🧋",description:"Colazioni e pranzi senza lattosio e glutine.",address:"Via Po, 22",phone:"+39 011 345678",sponsored:false,source:"verified"},
  {id:8,name:"Sushi & Free",city:"Milano",country:"Italia",type:"ristorante",tags:["gluten_free","lactose_free","combo_free","no_cross"],meals:["lunch","dinner","aperitivo"],certified:false,rating:4.4,reviewCount:167,emoji:"🍱",description:"Sushi bar con menu completamente gluten free e lactose free.",address:"Navigli, Via Alzaia, 90",phone:"+39 02 567890",sponsored:false,source:"google"},

    registerFree:"Sign up free", goPremium:"Go Premium", orLogin:"Already have an account?",

    freeBanner:"Free plan",
    locating:"Searching...", nearbyResults:"Near you",

const GUEST_STRUCTS=2, FREE_LIMIT=3, FREE_STRUCTS=5;
const inpStyle={width:"100%",padding:12,borderRadius:10,border:"1.5px solid #e5e7eb",fontSize:15,boxSizing:"border-box",fontFamily:"inherit",outline:"none"};

function App() {
  const [lang,setLang]=React.useState("it");
  const [screen,setScreen]=React.useState("welcome");
  const [authMode,setAuthMode]=React.useState("login");
  const [user,setUser]=React.useState(null);
  const [premium,setPremium]=React.useState(false);
  const [q,setQ]=React.useState("");
  const [tagFilters,setTagFilters]=React.useState([]);
  const [mealFilter,setMealFilter]=React.useState(null);
  const [results,setResults]=React.useState([]);
  const [sel,setSel]=React.useState(null);
  const [prevScr,setPrevScr]=React.useState("home");
  const [cnt,setCnt]=React.useState(0);
  const [popup,setPopup]=React.useState(null);
  const [showUp,setShowUp]=React.useState(false);
  const [revs,setRevs]=React.useState({1:[{id:1,user:"Marco R.",rating:5,text:"Ottimo! Molto attenti alle intolleranze.",date:"2024-03-15"}]});
  const [nr,setNr]=React.useState({rating:5,text:""});
  const [revOk,setRevOk]=React.useState(false);
  const [tab,setTab]=React.useState("home");
  const [aName,setAName]=React.useState("");
  const [aEmail,setAEmail]=React.useState("");
  const [aPass,setAPass]=React.useState("");
  const [guestSearches,setGuestSearches]=React.useState(0);
  const [socialPopup,setSocialPopup]=React.useState(null);
  const isGuest=!user;
  const t=T[lang];

  const go=(s,prev)=>{if(prev)setPrevScr(prev);setScreen(s);};
  const tl=()=>setLang(l=>l==="it"?"en":"it");
  const toggleTag=f=>setTagFilters(fs=>fs.includes(f)?fs.filter(x=>x!==f):[...fs,f]);
  const showPopup=(title,sub,type)=>setPopup({title,sub,type});
  const closePopup=()=>setPopup(null);

  const sortedStructures = [...STRUCTURES].sort((a,b)=>{
    const r={registered:3,verified:2,google:1};
    return (r[b.source]||0)-(r[a.source]||0) || Number(b.sponsored)-Number(a.sponsored);
  });

  const doSearch=()=>{
    if(isGuest&&guestSearches>=1){showPopup(t.popGuestLimit,t.popGuestLimitSub,"register");return;}
    if(!premium&&cnt>=FREE_LIMIT){showPopup(t.popSearch,t.popSearchSub,"upgrade");return;}
    let res=sortedStructures.filter(s=>{
      const mq=!q||s.name.toLowerCase().includes(q.toLowerCase())||s.city.toLowerCase().includes(q.toLowerCase());
      const mf=tagFilters.length===0||tagFilters.every(f=>s.tags.includes(f));
      const mm=!mealFilter||s.meals.includes(mealFilter);
      return mq&&mf&&mm;
    });
    if(isGuest){setGuestSearches(1);res=res.slice(0,GUEST_STRUCTS);}
    else if(!premium){setCnt(c=>c+1);res=res.slice(0,FREE_STRUCTS);}
    setResults(res);setTab("explore");go("results","home");
  };

  const doAuth=()=>{
    if(!aEmail||!aPass)return;
    setUser({name:authMode==="register"?(aName||aEmail.split("@")[0]):aEmail.split("@")[0],email:aEmail});
    setAName("");setAEmail("");setAPass("");closePopup();go("home");
  };

  const addRev=sid=>{
    if(isGuest){showPopup(t.popReview,t.popReviewSub,"register");return;}
    if(!nr.text.trim())return;
    const r={id:Date.now(),user:user.name,rating:nr.rating,text:nr.text,date:new Date().toISOString().split("T")[0]};
    setRevs(rv=>({...rv,[sid]:[...(rv[sid]||[]),r]}));
    setNr({rating:5,text:""});setRevOk(true);
    setTimeout(()=>setRevOk(false),2500);
  };

  const ghost={background:"rgba(255,255,255,0.2)",border:"none",color:"white",padding:"6px 12px",borderRadius:20,cursor:"pointer",fontSize:13};
  const btnG={background:GREEN,color:"white",border:"none",padding:"13px 20px",borderRadius:12,fontWeight:700,fontSize:15,cursor:"pointer",width:"100%"};
  const card={background:"white",borderRadius:14,padding:16,boxShadow:"0 2px 12px rgba(0,0,0,.07)",marginBottom:12};

  const LogoSVG=({size=22,white=true})=>(
    <svg width={size} height={size*1.6} viewBox="0 0 40 64" style={{display:"block",flexShrink:0}}>
      <circle cx="20" cy="12" r="12" fill={white?"white":"#1a5c3a"}/>
      <circle cx="14" cy="7" r="3.5" fill={white?"#1a5c3a":"white"} opacity="0.4"/>
      <path d="M20,24 L20,50 Q20,62 6,62" fill="none" stroke={white?"white":"#1a5c3a"} strokeWidth="7" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );

  const SourceBadge=({source})=>{
    const s=SOURCES[source];
    if(!s)return null;
    return <span style={{background:s.bg,color:s.color,fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:10,whiteSpace:"nowrap"}}>{s.icon} {s[lang]}</span>;
  };

  const StructCard=({s,index,guestMode})=>{
    const locked=guestMode&&index>=GUEST_STRUCTS;
    return(
      <div onClick={()=>{if(locked){showPopup(t.popGuestLimit,t.popGuestLimitSub,"register");return;}setSel(s);go("detail",screen);}}
        style={{...card,border:s.sponsored?"2px solid #f59e0b":"2px solid transparent",cursor:"pointer",marginBottom:10,position:"relative",filter:locked?"blur(3px)":"none"}}>
        {locked&&<div style={{position:"absolute",inset:0,background:"rgba(255,255,255,0.55)",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",zIndex:2,flexDirection:"column",gap:5}}>
          <span style={{fontSize:26}}>🔒</span>
          <span style={{fontSize:11,color:"#1a5c3a",fontWeight:700,background:"#d1fae5",padding:"3px 10px",borderRadius:10}}>{t.registerFree}</span>
        </div>}
        <div style={{display:"flex",gap:12}}>
          <div style={{fontSize:30,background:"#f0fdf4",borderRadius:12,width:54,height:54,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{s.emoji}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",justifyContent:"space-between",gap:4,marginBottom:3}}>
              <h4 style={{margin:0,fontSize:14,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</h4>
              <div style={{display:"flex",gap:3,flexShrink:0,flexWrap:"wrap",justifyContent:"flex-end"}}>
                {s.sponsored&&<span style={{background:"#fef3c7",color:"#d97706",fontSize:10,fontWeight:700,padding:"2px 6px",borderRadius:10}}>📢</span>}
                {s.certified&&<span style={{background:"#d1fae5",color:"#065f46",fontSize:10,fontWeight:700,padding:"2px 6px",borderRadius:10}}>✅</span>}
                <SourceBadge source={s.source}/>
              </div>
            </div>
            <p style={{margin:"0 0 4px",fontSize:11,color:"#6b7280"}}>📍 {s.city}, {s.country}</p>
            <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:3}}>
              {s.meals.map(m=><span key={m} style={{background:"#fef9ec",color:"#d97706",fontSize:10,padding:"2px 6px",borderRadius:10}}>{MEALS[m]?.icon} {MEALS[m]?.[lang]}</span>)}
            </div>
            <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:3}}>
              {s.tags.filter(tg=>TAGS[tg]?.color!=="#dc2626"&&TAGS[tg]?.color!=="#d97706"&&TAGS[tg]?.color!=="#065f46").map(tg=>(
                <span key={tg} style={{background:TAGS[tg]?.color+"22",color:TAGS[tg]?.color,fontSize:10,padding:"2px 6px",borderRadius:10}}>{TAGS[tg]?.icon} {TAGS[tg]?.[lang]}</span>
              ))}
            </div>
            {s.rating&&<div style={{display:"flex",alignItems:"center",gap:4}}>
              <span style={{color:"#f59e0b",fontSize:11}}>⭐</span>
              <span style={{fontSize:12,fontWeight:600}}>{s.rating}</span>
              <span style={{fontSize:11,color:"#9ca3af"}}>({s.reviewCount})</span>
            </div>}
          </div>
        </div>
      </div>
    );
  };

  const FilterPanel=()=>(
    <div style={card}>
      <p style={{margin:"0 0 8px",fontSize:11,color:"#6b7280",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>{t.mealFilter}</p>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
        <button onClick={()=>setMealFilter(null)} style={{background:!mealFilter?"#1f2937":"#f3f4f6",color:!mealFilter?"white":"#374151",border:"none",padding:"6px 11px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:!mealFilter?700:400}}>🍽️ {t.allMeals}</button>
        {Object.entries(MEALS).map(([k,m])=>(
          <button key={k} onClick={()=>isGuest?showPopup(t.popGuestLimit,t.popGuestLimitSub,"register"):setMealFilter(mealFilter===k?null:k)}
            style={{background:mealFilter===k?"#1f2937":"#f3f4f6",color:mealFilter===k?"white":"#374151",border:"none",padding:"6px 11px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:mealFilter===k?700:400}}>
            {m.icon} {m[lang]}
          </button>
        ))}
      </div>
      <p style={{margin:"0 0 8px",fontSize:11,color:"#6b7280",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>{t.filters}</p>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
        {Object.entries(TAGS).filter(([,tg])=>!["#065f46","#d97706","#dc2626"].includes(tg.color)).map(([k,tg])=>(
          <button key={k} onClick={()=>isGuest?showPopup(t.popGuestLimit,t.popGuestLimitSub,"register"):toggleTag(k)}
            style={{background:tagFilters.includes(k)?tg.color:"#f3f4f6",color:tagFilters.includes(k)?"white":"#374151",border:"none",padding:"6px 11px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:tagFilters.includes(k)?700:400}}>
            {tg.icon} {tg[lang]}
          </button>
        ))}
      </div>
      <p style={{margin:"0 0 8px",fontSize:11,color:"#6b7280",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>{t.crossSection}</p>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:4}}>
        {Object.entries(TAGS).filter(([,tg])=>["#065f46","#d97706","#dc2626"].includes(tg.color)).map(([k,tg])=>(
          <button key={k} onClick={()=>isGuest?showPopup(t.popGuestLimit,t.popGuestLimitSub,"register"):toggleTag(k)}
            style={{background:tagFilters.includes(k)?tg.color:"#f3f4f6",color:tagFilters.includes(k)?"white":"#374151",border:"none",padding:"6px 11px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:tagFilters.includes(k)?700:400}}>
            {tg.icon} {tg[lang]}
          </button>
        ))}
      </div>
      <p style={{margin:"4px 0 0",fontSize:10,color:"#9ca3af"}}>{t.crossLegend}</p>
      {(tagFilters.length>0||mealFilter)&&(
        <button onClick={doSearch} style={{width:"100%",background:GREEN,color:"white",border:"none",padding:"11px",borderRadius:12,fontWeight:700,fontSize:14,cursor:"pointer",marginTop:14}}>
          🔍 {t.searchBtn} {tagFilters.length>0||mealFilter?`(${[...tagFilters,mealFilter].filter(Boolean).length} ${lang==="it"?"filtri attivi":"active filters"})`:""} 
        </button>
      )}
    </div>
  );

  const BottomNav=()=>(
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"white",borderTop:"1px solid #e5e7eb",display:"flex",justifyContent:"space-around",padding:"8px 0 10px",zIndex:100,boxShadow:"0 -4px 15px rgba(0,0,0,.06)"}}>
      {[{id:"home",icon:"🏠",lbl:t.home},{id:"explore",icon:"🔍",lbl:t.explore},{id:"profile",icon:"👤",lbl:t.profile}].map(tb=>(
        <button key={tb.id} onClick={()=>{setTab(tb.id);
          if(tb.id==="home")go("home");
          else if(tb.id==="profile")isGuest?showPopup(t.popGuestLimit,t.popGuestLimitSub,"register"):go("profile");
          else if(tb.id==="explore"&&results.length>0)go("results");
        }} style={{background:"none",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",padding:"4px 20px",color:tab===tb.id?"#1a5c3a":"#9ca3af"}}>
          <span style={{fontSize:22}}>{tb.icon}</span>
          <span style={{fontSize:11,fontWeight:tab===tb.id?700:400}}>{tb.lbl}</span>
        </button>
      ))}
    </div>
  );

  const UpgradeModal=()=>(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:1000}}>
      <div style={{background:"white",width:"100%",maxWidth:480,borderRadius:"24px 24px 0 0",padding:"28px 24px 36px"}}>

          <div style={{fontSize:44}}>⭐</div>

  }

  // PROFILE
  if(screen==="profile")return(
    <div style={{background:"#f9fafb",minHeight:"100vh",paddingBottom:80,fontFamily:"inherit"}}>
      <div style={{background:GREEN,padding:"40px 20px 60px",textAlign:"center",color:"white"}}>
        <div style={{fontSize:46,background:"rgba(255,255,255,.15)",borderRadius:"50%",width:72,height:72,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px"}}>👤</div>
        <h2 style={{margin:"0 0 4px",fontSize:19,fontWeight:800}}>{user?.name}</h2>
        <p style={{margin:0,fontSize:13,opacity:.85}}>{user?.email}</p>
        {premium&&<span style={{display:"inline-block",marginTop:10,background:"#f59e0b",padding:"4px 12px",borderRadius:15,fontSize:13,fontWeight:700}}>⭐ Premium</span>}
      </div>
      <div style={{padding:"0 16px",marginTop:-20}}>
        <div style={card}>
          {premium?<div style={{background:"#d1fae5",borderRadius:12,padding:14}}>
            <p style={{margin:"0 0 4px",fontWeight:700,color:"#065f46"}}>⭐ {t.premiumPlan}</p>
            <p style={{margin:0,fontSize:13,color:"#047857"}}>{t.features}</p>
          </div>:<>
            <div style={{background:"#f9fafb",borderRadius:12,padding:12,marginBottom:10}}>
              <p style={{margin:"0 0 8px",fontSize:13,color:"#6b7280"}}>{lang==="it"?"3 ricerche/mese · Max 5 strutture":"3 searches/month · Max 5 structures"}</p>
              <div style={{background:"#e5e7eb",borderRadius:10,height:6,overflow:"hidden",marginBottom:4}}>
                <div style={{background:cnt>=FREE_LIMIT?"#ef4444":"#1a5c3a",height:"100%",width:`${Math.min((cnt/FREE_LIMIT)*100,100)}%`}}/>
              </div>
              <p style={{margin:0,fontSize:11,color:"#6b7280"}}>{cnt}/{FREE_LIMIT} {t.searchesUsed.toLowerCase()}</p>
            </div>
            <button onClick={()=>setShowUp(true)} style={btnG}>⭐ {t.upgradeNow}</button>
          </>}
        </div>
        <div style={card}>
          <button onClick={tl} style={{width:"100%",background:"#f9fafb",border:"none",padding:12,borderRadius:10,fontSize:14,cursor:"pointer",color:"#374151",textAlign:"left",marginBottom:8}}>
            🌐 {lang==="it"?"Switch to English":"Passa all'italiano"}
          </button>
          <button onClick={()=>{setUser(null);setScreen("welcome");setPremium(false);setCnt(0);setTab("home");}} style={{width:"100%",background:"#fef2f2",border:"none",padding:12,borderRadius:10,fontSize:14,cursor:"pointer",color:"#ef4444",textAlign:"left"}}>
            🚪 {t.logout}
          </button>
        </div>
      </div>
      <BottomNav/>{showUp&&<UpgradeModal/>}
    </div>
  );

  // BUSINESS
  if(screen==="business")return(
    <div style={{minHeight:"100vh",background:"#f9fafb",fontFamily:"inherit"}}>
      <div style={{background:GREEN,padding:"24px 20px 32px",color:"white",textAlign:"center"}}>
        <button onClick={()=>go("welcome")} style={{...ghost,position:"absolute",top:16,left:16}}>←</button>
        <LogoSVG size={32}/>
        <h2 style={{margin:"8px 0 4px",fontSize:18,fontWeight:700}}>🏢 {t.bizBtn}</h2>
        <p style={{margin:0,fontSize:13,opacity:.85}}>{lang==="it"?"Raggiungi chi ti cerca":"Reach those who need you"}</p>
      </div>
      <div style={{padding:16}}>
        <div style={card}>
          <p style={{fontSize:14,color:"#6b7280",marginBottom:16,lineHeight:1.6}}>{lang==="it"?"Registra la tua attività su Juniper e raggiungi utenti con intolleranze e scelte alimentari specifiche.":"Register your business on Juniper and reach users with specific dietary needs."}</p>
          <button onClick={()=>{setAuthMode("register");go("auth");}} style={btnG}>🌿 {t.registerFree}</button>
        </div>
      </div>
    </div>
  );

  return null;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
