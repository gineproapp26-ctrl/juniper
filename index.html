function BusinessScreen({lang,go}){
  const ghost2={background:"rgba(255,255,255,0.2)",border:"none",color:"white",padding:"6px 12px",borderRadius:20,cursor:"pointer",fontSize:13};
  const btnG2={background:GREEN,color:"white",border:"none",padding:"13px",borderRadius:12,fontWeight:700,fontSize:15,cursor:"pointer",width:"100%"};
  const tx={
    it:{back:"Indietro",title:"Registra la tua attività",sub:"Raggiungi chi cerca esattamente quello che offri",searchPh:"Cerca per nome o città...",claim:"Sono il titolare",addNew:"Aggiungi da zero",results:"risultati",baseInfo:"📋 Info base",typeLabel:"🏪 Tipo",openLabel:"🍽️ Quando siete aperti?",offersLabel:"✅ Cosa offrite?",kitchenLabel:"🔬 Sicurezza in cucina",kitchenSub:"Sii onesto — è importante per i tuoi clienti",badgeLabel:"🏅 Richiedi Badge Certificato",badgeSub:"Verifica a pagamento.",send:"Invia richiesta",sent:"Richiesta inviata!",sentSub:"Ti contatteremo a",backHome:"Torna alla home",disclaimerTitle:"⚖️ Dichiarazione di responsabilità",disclaimerText:"Il titolare dichiara sotto la propria responsabilità che le informazioni inserite sono veritiere e aggiornate. Juniper non è responsabile per eventuali inesattezze. L'utente finale è sempre invitato a confermare direttamente con il locale prima di consumare.",disclaimerCheck:"Ho letto e accetto. Confermo che le informazioni sono veritiere e mi assumo la piena responsabilità dei contenuti pubblicati.",cancel:"Annulla"},
    en:{back:"Back",title:"Register your business",sub:"Reach those looking for exactly what you offer",searchPh:"Search by name or city...",claim:"I'm the owner",addNew:"Add from scratch",results:"results",baseInfo:"📋 Basic info",typeLabel:"🏪 Type",openLabel:"🍽️ When are you open?",offersLabel:"✅ What do you offer?",kitchenLabel:"🔬 Kitchen safety",kitchenSub:"Be honest — it matters to your customers",badgeLabel:"🏅 Request Certified Badge",badgeSub:"Paid verification service.",send:"Send request",sent:"Request sent!",sentSub:"We'll contact you at",backHome:"Back to home",disclaimerTitle:"⚖️ Liability Declaration",disclaimerText:"The owner declares under their own responsibility that the information provided is truthful and up to date. Juniper is not liable for any inaccuracies. End users are always encouraged to confirm directly with the venue before consuming.",disclaimerCheck:"I have read and agree. I confirm the information is truthful and take full responsibility for the published content.",cancel:"Cancel"},

  const GKEY="AIzaSyA4G_OKIatAuX9DzcFfgTQmrGtveNfw3ck";
  const searchGooglePlaces=async(query,tags)=>{
    try{
      const tagWords=(tags||[]).map(k=>TAGS[k]?.it||"").filter(Boolean).join(" ");

      const textQuery=(hasFood?"":"ristorante ")+(query||"Maremma Grosseto")+(tagWords?" "+tagWords:"")+" Toscana Italia";
      const resp=await fetch("https://places.googleapis.com/v1/places:searchText",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "X-Goog-Api-Key":GKEY,
          "X-Goog-FieldMask":"places.id,places.displayName,places.formattedAddress,places.rating,places.userRatingCount,places.primaryType,places.shortFormattedAddress"
        },
        body:JSON.stringify({textQuery,languageCode:"it",maxResultCount:15})
      });
      if(!resp.ok)return[];
      const data=await resp.json();
      const places=data.places||[];
      return places.map(p=>{
        const pt=p.primaryType||"";
        let type="ristorante",emoji="🍽️";
        if(pt.includes("bar")||pt.includes("cafe")){type="bar";emoji="☕";}
        else if(pt.includes("bakery")||pt.includes("pastry")){type="pasticceria";emoji="🧁";}
        else if(pt.includes("lodging")||pt.includes("hotel")){type="hotel";emoji="🏨";}
        else if(pt.includes("farm")||pt.includes("campground")){type="agriturismo";emoji="🌾";}
        const name=(p.displayName?.text||p.displayName||"Locale");
        const addr=p.shortFormattedAddress||p.formattedAddress||"";
        const parts=(p.formattedAddress||"").split(",");
        const city=parts.length>2?parts[parts.length-3]?.trim()||"Italia":"Italia";
        return{
          id:"g_"+(p.id||Math.random().toString(36)),
          name,type,city,country:"Italia",address:addr,phone:"",
          description:type+" · "+city,emoji,
          tags:[], // nessun tag automatico — vengono dalle recensioni
          meals:type==="bar"?["breakfast","aperitivo"]:["lunch","dinner"],
          source:"google",certified:false,sponsored:false,
          rating:p.rating||null,reviewCount:p.userRatingCount||0,
          unverified:true,
        };
      });
    }catch(e){return[];}
  };

  const doSearch=async()=>{
    const lq=q.toLowerCase();
    setFound(DEMO.filter(s=>s.name.toLowerCase().includes(lq)||s.city.toLowerCase().includes(lq)));
  };
  const claim=(s)=>{
    setSel(s);
    if(s) setForm(f=>({...f,name:s.name,city:s.city,address:s.address||"",phone:s.phone||"",tags:s.tags.filter(k=>DIET_TAGS.includes(k)),meals:s.meals||[],cross:s.tags.find(k=>CROSS_TAGS.includes(k))||""}));
    else setForm({name:"",type:"ristorante",city:"",address:"",phone:"",email:"",website:"",instagram:"",description:"",tags:[],meals:[],cross:"",certified:false});
    setStep("form");
  };
  const toggleTag=k=>setForm(f=>({...f,tags:f.tags.includes(k)?f.tags.filter(x=>x!==k):[...f.tags,k]}));
  const toggleMeal=k=>setForm(f=>({...f,meals:f.meals.includes(k)?f.meals.filter(x=>x!==k):[...f.meals,k]}));

  const submit=async()=>{
    if(!form.email||!disclaimer)return;
    setSending(true);
    await sb.from("business_requests").insert({
      structure_id: sel?.id&&!sel.id.startsWith("d")?sel.id:null,
      name:form.name,type:form.type,city:form.city,address:form.address,
      phone:form.phone,email:form.email,website:form.website,instagram:form.instagram,
      description:form.description,tags:form.tags,meals:form.meals,
      kitchen_safety:form.cross,certified_request:form.certified,
      disclaimer_accepted:true,disclaimer_accepted_at:new Date().toISOString(),
    });
    setSending(false);
    setSent(true);
  };

  if(sent) return(
    <div style={{minHeight:"100vh",background:"#f9fafb"}}>
      <div style={{background:GREEN,padding:"20px",color:"white"}}>
        <button onClick={()=>go("welcome")} style={{...ghost2,display:"block"}}>← {t.back}</button>
      </div>
      <div style={{padding:16}}>
        <div style={{...card,textAlign:"center",padding:28}}>
          <div style={{fontSize:52,marginBottom:12}}>✅</div>
          <h3 style={{margin:"0 0 8px",fontSize:18,fontWeight:800,color:"#1a5c3a"}}>{t.sent}</h3>
          <p style={{margin:"0 0 20px",fontSize:14,color:"#6b7280"}}>{t.sentSub} <strong>{form.email}</strong></p>
          <button onClick={()=>go("welcome")} style={btnG2}>{t.backHome}</button>
        </div>
      </div>
    </div>
  );

  if(step==="search") return(
    <div style={{minHeight:"100vh",background:"#f9fafb",paddingBottom:40}}>
      <div style={{background:GREEN,padding:"20px",color:"white"}}>
        <button onClick={()=>go("welcome")} style={{...ghost2,marginBottom:10,display:"block"}}>← {t.back}</button>
        <Logo size={24}/>
        <h2 style={{margin:"8px 0 2px",fontSize:17,fontWeight:700}}>🏢 {t.title}</h2>
        <p style={{margin:0,fontSize:13,opacity:.8}}>{t.sub}</p>
      </div>
      <div style={{padding:16}}>
        <div style={card}>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch()} placeholder={t.searchPh} style={{...inp,flex:1}}/>
            <button onClick={doSearch} style={{background:"#1a5c3a",color:"white",border:"none",padding:"10px 16px",borderRadius:10,cursor:"pointer",fontWeight:700}}>🔍</button>
          </div>
          {found.map(s=>(
            <div key={s.id} style={{border:"1.5px solid #e5e7eb",borderRadius:12,padding:12,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
              <div><p style={{margin:"0 0 2px",fontWeight:700,fontSize:13}}>{s.emoji} {s.name}</p><p style={{margin:0,fontSize:11,color:"#6b7280"}}>📍 {s.city}</p></div>
              <button onClick={()=>claim(s)} style={{background:"#1a5c3a",color:"white",border:"none",padding:"8px 12px",borderRadius:10,cursor:"pointer",fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>{t.claim}</button>
            </div>
          ))}
          <button onClick={()=>claim(null)} style={{width:"100%",background:"#f9fafb",border:"1.5px solid #e5e7eb",padding:12,borderRadius:12,cursor:"pointer",fontSize:13,fontWeight:600,color:"#374151",marginTop:found.length>0?8:0}}>+ {t.addNew}</button>
        </div>
      </div>
    </div>
  );

  const types=["ristorante","bar","pizzeria","pasticceria","agriturismo","hotel","altro"];
  const typeEmojis={ristorante:"🍽️",bar:"☕",pizzeria:"🍕",pasticceria:"🧁",agriturismo:"🌾",hotel:"🏨",altro:"🏪"};
  return(
    <div style={{minHeight:"100vh",background:"#f9fafb",paddingBottom:40}}>
      <div style={{background:GREEN,padding:"20px",color:"white"}}>
        <button onClick={()=>setStep("search")} style={{...ghost2,marginBottom:10,display:"block"}}>← {t.back}</button>
        <Logo size={24}/>
        <h2 style={{margin:"8px 0 0",fontSize:17,fontWeight:700}}>🏢 {t.title}</h2>
      </div>
      <div style={{padding:16}}>
        {sel&&<div style={{background:"#f0fdf4",borderRadius:12,padding:12,marginBottom:12,border:"1.5px solid #bbf7d0"}}><p style={{margin:0,fontWeight:700,fontSize:13,color:"#1a5c3a"}}>{sel.emoji} {sel.name} — {lang==="it"?"dati precompilati":"pre-filled data"}</p></div>}
        <div style={card}>
          <p style={{margin:"0 0 10px",fontSize:11,color:"#6b7280",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>{t.baseInfo}</p>
          {[{k:"name",p:lang==="it"?"Nome attività *":"Business name *"},{k:"city",p:lang==="it"?"Città *":"City *"},{k:"address",p:lang==="it"?"Indirizzo":"Address"},{k:"phone",p:"Telefono"},{k:"email",p:"Email *"},{k:"website",p:"Sito web"},{k:"instagram",p:"Instagram"}].map(f=>(
            <input key={f.k} value={form[f.k]} onChange={e=>setForm(fm=>({...fm,[f.k]:e.target.value}))} placeholder={f.p} style={{...inp,marginBottom:10,fontSize:13}}/>
          ))}
          <textarea value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder={lang==="it"?"Descrizione...":"Description..."} style={{...inp,resize:"none",height:70,fontSize:13}}/>
        </div>
        <div style={card}>
          <p style={{margin:"0 0 8px",fontSize:11,color:"#6b7280",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>{t.typeLabel}</p>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>

          </div>
        </div>
        <div style={card}>
          <p style={{margin:"0 0 8px",fontSize:11,color:"#6b7280",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>{t.openLabel}</p>

            {DIET_TAGS.map(k=><button key={k} onClick={()=>toggleTag(k)} style={{background:form.tags.includes(k)?TAGS[k].color:"#f3f4f6",color:form.tags.includes(k)?"white":"#374151",border:"none",padding:"7px 12px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:form.tags.includes(k)?700:400}}>{TAGS[k].icon} {TAGS[k][lang==="it"?"it":"en"]}</button>)}
          </div>
        </div>
        <div style={card}>
          <p style={{margin:"0 0 4px",fontSize:11,color:"#6b7280",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>{t.kitchenLabel}</p>
          <p style={{margin:"0 0 10px",fontSize:12,color:"#9ca3af"}}>{t.kitchenSub}</p>
          {CROSS_TAGS.map(k=>(
            <div key={k} onClick={()=>setForm(f=>({...f,cross:f.cross===k?"":k}))} style={{border:"2px solid "+(form.cross===k?TAGS[k].color:"#e5e7eb"),borderRadius:12,padding:"10px 14px",cursor:"pointer",marginBottom:8,background:form.cross===k?TAGS[k].color+"11":"white",display:"flex",alignItems:"center",gap:10}}>

              <div><p style={{margin:"0 0 2px",fontWeight:700,fontSize:13,color:TAGS[k].color}}>{TAGS[k][lang==="it"?"it":"en"]}</p><p style={{margin:0,fontSize:11,color:"#6b7280"}}>{CROSS_DESC[lang][k]}</p></div>
            </div>
          ))}
        </div>
        <div style={{...card,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><p style={{margin:"0 0 3px",fontWeight:700,fontSize:13,color:"#1a5c3a"}}>{t.badgeLabel}</p><p style={{margin:0,fontSize:11,color:"#6b7280"}}>{t.badgeSub}</p></div>
          <div onClick={()=>setForm(f=>({...f,certified:!f.certified}))} style={{width:44,height:24,borderRadius:12,background:form.certified?"#1a5c3a":"#e5e7eb",cursor:"pointer",position:"relative",flexShrink:0}}>
            <div style={{width:18,height:18,borderRadius:"50%",background:"white",position:"absolute",top:3,left:form.certified?23:3,transition:"left 0.2s"}}/>
          </div>
        </div>
        <div style={{background:"#fef9ec",borderRadius:14,padding:16,marginBottom:14,border:"1.5px solid #fed7aa"}}>
          <p style={{margin:"0 0 8px",fontSize:12,fontWeight:700,color:"#92400e"}}>⚖️ {t.disclaimerTitle}</p>
          <p style={{margin:"0 0 12px",fontSize:12,color:"#374151",lineHeight:1.6}}>{t.disclaimerText}</p>
          <label style={{display:"flex",gap:10,alignItems:"flex-start",cursor:"pointer"}}>
            <input type="checkbox" checked={disclaimer} onChange={e=>setDisclaimer(e.target.checked)} style={{marginTop:2,accentColor:"#1a5c3a",width:16,height:16,flexShrink:0}}/>
            <span style={{fontSize:12,color:"#374151",fontWeight:600,lineHeight:1.5}}>{t.disclaimerCheck}</span>
          </label>
        </div>
        <button onClick={submit} disabled={!form.email||!disclaimer||sending} style={{...btnG2,opacity:(form.email&&disclaimer)?1:0.5,fontSize:16,padding:"15px"}}>
          {sending?"⏳ Invio...":`🌿 ${t.send}`}
        </button>
      </div>
    </div>
  );
}

function PolicyScreen({lang,go}){

        }

        setALoading(false);

    const {data,error}=await sb.auth.signInWithPassword({email:aEmail,password:aPass}).catch(e=>({data:null,error:e}));

  // ── GOOGLE PLACES REST API ──
  const GKEY="AIzaSyA4G_OKIatAuX9DzcFfgTQmrGtveNfw3ck";
  const searchGooglePlaces=async(query,tags)=>{
    try{
      const tagWords=(tags||[]).map(k=>TAGS[k]?.it||"").filter(Boolean).join(" ");
      const hasFood=query&&["ristorante","bar","pizzeria","agriturismo"].some(w=>query.toLowerCase().includes(w));
      const textQuery=(hasFood?"":"ristorante ")+(query||"Maremma Grosseto")+(tagWords?" "+tagWords:"")+" Toscana Italia";
      const resp=await fetch("https://places.googleapis.com/v1/places:searchText",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "X-Goog-Api-Key":GKEY,
          "X-Goog-FieldMask":"places.id,places.displayName,places.formattedAddress,places.rating,places.userRatingCount,places.primaryType,places.shortFormattedAddress"
        },
        body:JSON.stringify({textQuery,languageCode:"it",maxResultCount:15})
      });
      if(!resp.ok)return[];
      const data=await resp.json();
      const places=data.places||[];
      return places.map(p=>{
        const pt=p.primaryType||"";
        let type="ristorante",emoji="🍽️";
        if(pt.includes("bar")||pt.includes("cafe")){type="bar";emoji="☕";}
        else if(pt.includes("bakery")||pt.includes("pastry")){type="pasticceria";emoji="🧁";}
        else if(pt.includes("lodging")||pt.includes("hotel")){type="hotel";emoji="🏨";}
        else if(pt.includes("farm")||pt.includes("campground")){type="agriturismo";emoji="🌾";}
        const name=(p.displayName?.text||p.displayName||"Locale");
        const addr=p.shortFormattedAddress||p.formattedAddress||"";
        const parts=(p.formattedAddress||"").split(",");
        const city=parts.length>2?parts[parts.length-3]?.trim()||"Italia":"Italia";
        return{
          id:"g_"+(p.id||Math.random().toString(36)),
          name,type,city,country:"Italia",address:addr,phone:"",
          description:type+" · "+city,emoji,
          tags:[], // nessun tag automatico — vengono dalle recensioni
          meals:type==="bar"?["breakfast","aperitivo"]:["lunch","dinner"],
          source:"google",certified:false,sponsored:false,
          rating:p.rating||null,reviewCount:p.userRatingCount||0,
          unverified:true,
        };
      });
    }catch(e){return[];}
  };

  const doSearch=async()=>{

    // 1. Risultati da Supabase
    let res=structs.filter(s=>{
      const mf=tagFilters.length===0||tagFilters.every(f=>s.tags&&s.tags.includes(f));
      const mm=!mealFilter||(s.meals&&s.meals.includes(mealFilter));
      return mf&&mm;
    });
    if(q){
      const qRes=res.filter(s=>
        (s.name&&s.name.toLowerCase().includes(q.toLowerCase()))||
        (s.city&&s.city.toLowerCase().includes(q.toLowerCase()))||
        (s.address&&s.address.toLowerCase().includes(q.toLowerCase()))
      );
      if(qRes.length>0)res=qRes;
    }
    if(isGuest){setGuestSearches(1);res=res.slice(0,GUEST_MAX);}
    // 2. Google Places — cerca e aspetta max 5 secondi
    try{
      const gRes=await Promise.race([
        searchGooglePlaces(q||"ristorante",tagFilters),
        new Promise(r=>setTimeout(()=>r([]),5000))
      ]);
      if(gRes&&gRes.length>0){
        const existing=new Set(res.map(s=>(s.name||"").toLowerCase()));

                searchGooglePlaces(`ristorante vicino ${lat},${lon}`,[]).then(res=>{

              <p style={{margin:0,fontSize:13,color:"#6b7280"}}>📍 {s.address}</p>
              {s.phone&&<p style={{margin:0,fontSize:13,color:"#6b7280"}}>📞 {s.phone}</p>}
              {s.rating&&<div style={{display:"flex",alignItems:"center",gap:5}}><span style={{color:"#f59e0b"}}>{"⭐".repeat(Math.round(s.rating))}</span><span style={{fontSize:13,fontWeight:700}}>{s.rating}</span><span style={{fontSize:12,color:"#9ca3af"}}>({s.reviewCount} {t.reviews})</span></div>}
            </div>
          </div>
          <div style={card}>
            <h3 style={{margin:"0 0 12px",fontSize:14,fontWeight:700}}>💬 {t.reviews} ({sRevs.length})</h3>
            {sRevs.length===0?<p style={{color:"#9ca3af",fontSize:14,textAlign:"center",padding:"8px 0"}}>{t.noRev}</p>
            :sRevs.map((r,i)=>(
              <div key={r.id} style={{borderBottom:i<sRevs.length-1?"1px solid #f3f4f6":"none",paddingBottom:10,marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <span style={{fontWeight:600,fontSize:13}}>{r.user}</span>
                    {r.source==="google"&&<span style={{fontSize:10,background:"#f3f4f6",color:"#6b7280",padding:"1px 5px",borderRadius:6}}>Google</span>}
                  </div>
                  <span style={{fontSize:11,color:"#9ca3af"}}>{r.date}</span>
                </div>
                <div style={{marginBottom:3,fontSize:13}}>{"⭐".repeat(r.rating)}</div>
                <p style={{margin:0,fontSize:13,color:"#374151"}}>{r.text}</p>
              </div>
            ))}
            <div style={{borderTop:"1px solid #f3f4f6",marginTop:12,paddingTop:12}}>
              {isGuest?<div onClick={()=>showP(t.popReview,t.popReviewSub,"register")} style={{background:"#f0fdf4",borderRadius:12,padding:14,textAlign:"center",cursor:"pointer",border:"2px dashed #a7f3d0"}}><p style={{margin:"0 0 4px",fontWeight:600,color:"#1a5c3a",fontSize:13}}>💬 {t.popReview}</p><p style={{margin:0,fontSize:12,color:"#6b7280"}}>{t.popReviewSub}</p></div>
              :revOk?<div style={{background:"#d1fae5",color:"#065f46",padding:10,borderRadius:10,fontSize:14,fontWeight:600,textAlign:"center"}}>{t.reviewAdded}</div>
              :<>
                <h4 style={{margin:"0 0 8px",fontSize:13,fontWeight:600}}>✏️ {t.leaveReview}</h4>
                <div style={{display:"flex",gap:3,marginBottom:8}}>{[1,2,3,4,5].map(star=><button key={star} onClick={()=>setNr(r=>({...r,rating:star}))} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",opacity:star<=nr.rating?1:0.3,padding:0}}>⭐</button>)}</div>
                <textarea value={nr.text} onChange={e=>setNr(r=>({...r,text:e.target.value}))} placeholder={t.placeholder} style={{width:"100%",padding:10,borderRadius:10,border:"1px solid #e5e7eb",fontSize:14,resize:"none",height:75,boxSizing:"border-box",fontFamily:"inherit",outline:"none"}}/>
                <button onClick={()=>addRev(s.id)} style={{...btnG,marginTop:8,fontSize:14}}>{t.submit}</button>
              </>}
            </div>
          </div>
        </div>
        <BottomNav/><Popup/>
      </div>
    );
  }

  if(screen==="profile")return(
    <div style={{background:"#f9fafb",minHeight:"100vh",paddingBottom:80}}>
      <div style={{background:GREEN,padding:"36px 20px 56px",textAlign:"center",color:"white"}}>
        <div style={{fontSize:44,background:"rgba(255,255,255,.15)",borderRadius:"50%",width:70,height:70,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px"}}>👤</div>
        <h2 style={{margin:"0 0 4px",fontSize:18,fontWeight:800}}>{user?.name}</h2>
        <p style={{margin:0,fontSize:13,opacity:.85}}>{user?.email}</p>
        {premium&&<span style={{display:"inline-block",marginTop:10,background:"#f59e0b",padding:"4px 12px",borderRadius:15,fontSize:13,fontWeight:700}}>⭐ Premium</span>}
      </div>
      <div style={{padding:"0 16px",marginTop:-18}}>
        <div style={card}>
          {premium?<div style={{background:"#d1fae5",borderRadius:12,padding:14}}><p style={{margin:"0 0 4px",fontWeight:700,color:"#065f46"}}>⭐ {t.premiumPlan}</p><p style={{margin:0,fontSize:13,color:"#047857"}}>{t.features}</p></div>
          :<><div style={{background:"#f9fafb",borderRadius:12,padding:12,marginBottom:10}}><p style={{margin:"0 0 8px",fontSize:13,color:"#6b7280"}}>{lang==="it"?"8 ricerche/mese · illimitate con Premium":"8 searches/month · unlimited with Premium"}</p><div style={{background:"#e5e7eb",borderRadius:10,height:6,overflow:"hidden",marginBottom:4}}><div style={{background:cnt>=FREE_LIMIT?"#ef4444":"#1a5c3a",height:"100%",width:`${Math.min((cnt/FREE_LIMIT)*100,100)}%`}}/></div><p style={{margin:0,fontSize:11,color:"#6b7280"}}>{getSearchCount()}/{FREE_LIMIT} {t.searchesUsed.toLowerCase()} · reset 30gg</p></div><button onClick={()=>setShowUp(true)} style={btnG}>⭐ {t.upgradeNow}</button></>}
        </div>
        <div style={card}>
          <button onClick={tl} style={{width:"100%",background:"#f9fafb",border:"none",padding:12,borderRadius:10,fontSize:14,cursor:"pointer",color:"#374151",textAlign:"left",marginBottom:8}}>🌐 {lang==="it"?"Switch to English":"Passa all'italiano"}</button>
          <button onClick={()=>go("policy")} style={{width:"100%",background:"#f9fafb",border:"none",padding:12,borderRadius:10,fontSize:14,cursor:"pointer",color:"#374151",textAlign:"left",marginBottom:8}}>⚖️ {lang==="it"?"Policy & Termini":"Policy & Terms"}</button>
          <button onClick={async()=>{await sb.auth.signOut();setUser(null);setScreen("welcome");setPremium(false);setCnt(0);setTab("home");}} style={{width:"100%",background:"#fef2f2",border:"none",padding:12,borderRadius:10,fontSize:14,cursor:"pointer",color:"#ef4444",textAlign:"left"}}>🚪 {t.logout}</button>
        </div>
      </div>
      <BottomNav/>{showUp&&<UpgradeModal/>}
    </div>
  );

  return null;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
